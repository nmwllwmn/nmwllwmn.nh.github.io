<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>地图 - 林舟的手机</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="chat-shell">
    <main class="phone-stage">
      <section class="mi-phone">
        <section class="mi-screen app-screen map-app screen-enter">
          <div class="app-head"><a class="mini-back" href="chat.html">‹</a><strong>地图</strong></div>
          <form class="browser-search" id="mapSearch">
            <input name="q" placeholder="搜索地点 / 编号">
            <button type="submit">搜索</button>
          </form>
          <section class="phone-map-canvas">
            <div class="map-river"></div>
            <button class="map-pin s04" data-place="s04" type="button">S04</button>
            <button class="map-pin s08" data-place="s08" type="button">S08</button>
            <button class="map-pin b17" data-place="b17" type="button">B17</button>
            <button class="map-pin pump" data-place="pump" type="button">泵站</button>
          </section>
          <article class="map-result" id="mapResult">
            <h2>最近搜索</h2>
            <p class="mono">西桥观景台 / 北桥体育馆 / B17 / 雨水泵站</p>
            <p>6 月 6 日 21:32 后，定位点一直在北桥片区小范围漂移。</p>
          </article>
        </section>
      </section>
    </main>
    <script src="common.js"></script>
    <script>
      initGameShell({ stage: 16, page: "phone-map" });
      const params = new URLSearchParams(location.search);

      const places = {
        s04: ["S04 西桥观景台", "19:58 定位停留。之后轨迹向东北偏移，下一段没有官方签到点。", () => {}],
        s08: ["S08 北桥体育馆", "旧版路径缓存保留坐标。新版路线图不显示该点，周边道路仍有历史标注。", () => addEvidence("B")],
        b17: ["B17 地下通道 17 号门", "北桥体育馆地下连通道门牌。门禁状态记录曾在 00:17 出现短暂变化。", () => setFlag("foundB17")],
        pump: ["北桥雨水泵站", "相册定位在这里向西偏移 34 米。环境记录里有持续低频排水声。", () => setFlag("foundPumpStation")],
        imp: ["IMP-2202 导入任务", "2026-06-06 22:02 执行。任务内容折叠，来源字段只显示 Web Import。", () => {}]
      };

      function showPlace(key) {
        const place = places[key];
        const actionButton = key === "imp"
          ? "<button class=\"btn primary\" id=\"revealImpAccount\" type=\"button\">展开任务详情</button>"
          : "<button class=\"btn primary\" id=\"recordMap\" type=\"button\">保存地点记录</button>";
        document.querySelector("#mapResult").innerHTML = `
          <h2>${place[0]}</h2>
          <p>${place[1]}</p>
          ${actionButton}
        `;
        const reveal = document.querySelector("#revealImpAccount");
        if (reveal) {
          reveal.addEventListener("click", () => {
            document.querySelector("#mapResult").innerHTML = `
              <h2>IMP-2202 导入任务</h2>
              <p>执行账号：<strong>shenbo_admin</strong>。执行时间：2026-06-06 22:02。内容字段：linzhou / S05-S07 / append。</p>
              <button class="btn primary" id="recordMap" type="button">保存任务回执</button>
            `;
            document.querySelector("#recordMap").addEventListener("click", () => {
              addEvidence("E");
              setFlag("foundShenbo");
              toast("证据 E 已记录：IMP-2202 由 shenbo_admin 执行。");
            });
          });
          return;
        }
        document.querySelector("#recordMap").addEventListener("click", () => {
          place[2]();
          toast("地点记录已保存。");
        });
      }

      document.querySelectorAll(".map-pin").forEach((pin) => {
        pin.addEventListener("click", () => {
          location.href = `phone-map.html?place=${encodeURIComponent(pin.dataset.place)}`;
        });
      });

      document.querySelector("#mapSearch").addEventListener("submit", (event) => {
        event.preventDefault();
        const q = normalize(new FormData(event.target).get("q"));
        if (q.includes("imp2202") || q.includes("imp-2202")) {
          if (hasFlag("foundNvrLogin") || hasFlag("foundImp2202") || hasEvidence("D")) location.href = "phone-map.html?place=imp";
          else toast("没有找到公开任务。");
        }
        else if (q.includes("s08") || q.includes("北桥体育馆")) location.href = "phone-map.html?place=s08";
        else if (q.includes("b17") || q.includes("17号门") || q.includes("地下")) location.href = "phone-map.html?place=b17";
        else if (q.includes("泵站") || q.includes("排水")) location.href = "phone-map.html?place=pump";
        else if (q.includes("s04") || q.includes("西桥")) location.href = "phone-map.html?place=s04";
        else toast("没有找到地点。");
      });

      const initialPlace = params.get("place");
      if (initialPlace && places[initialPlace]) showPlace(initialPlace);
    </script>
  </body>
</html>
