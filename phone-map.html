<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>地图 - 林舟的手机</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="chat-shell">
    <main class="phone-stage">
      <section class="mi-phone">
        <section class="mi-screen app-screen map-app screen-enter">
          <div class="app-head"><a class="mini-back" href="chat.html">‹</a><strong>地图</strong></div>
          <form class="browser-search" id="mapSearch">
            <input name="q" placeholder="搜索地点 / 地图编号">
            <button type="submit">搜索</button>
          </form>
          <section class="phone-map-canvas">
            <div class="map-river"></div>
            <button class="map-pin s04" data-place="s04" type="button">S04</button>
            <button class="map-pin s08" data-place="s08" type="button">S08</button>
            <button class="map-pin b17" data-place="b17" type="button">B17</button>
            <button class="map-pin pump" data-place="pump" type="button">泵站</button>
          </section>
          <article class="map-result" id="mapResult">
            <h2>最近搜索</h2>
            <p class="mono">西桥观景台 / 北桥体育馆 / B17 / 雨水泵站</p>
            <p>6 月 6 日 21:32 后，定位点一直在北桥片区小范围漂移。地图编号需要从其他系统获得。</p>
          </article>
        </section>
      </section>
    </main>
    <script src="common.js?v=20260615-final-threat"></script>
    <script>
      initGameShell({ stage: 16, page: "phone-map" });
      const params = new URLSearchParams(location.search);

      const places = {
        s04: {
          title: "S04 西桥观景台",
          body: "19:58 定位停留。之后轨迹向东北偏移，下一段没有官方签到点。"
        },
        s08: {
          title: "S08 北桥体育馆",
          body: "旧版路线缓存保留坐标。新版路线图不显示该点，但周边道路仍有历史标注。",
          action: () => addEvidence("B")
        },
        b17: {
          title: "B17 地下通道 17 号门",
          body: "北桥体育馆地下连通道门牌。门禁状态记录曾在 00:17 出现短暂维护窗口。",
          action: () => { setFlag("foundB17"); setFlag("foundRescueWindow"); }
        },
        pump: {
          title: "北桥雨水泵站",
          body: "相册定位和监控残影都指向这里。B17 向西偏 34 米，环境记录里有持续低频排水声。",
          action: () => setFlag("foundPumpStation")
        },
        imp: {
          title: "IMP-2202 导入任务",
          body: "地图编号 IMP-2202 对应 6 月 6 日 22:02 的批量导入任务。执行账号为 shenbo_admin，内容字段为 linzhou / S05-S07 / append。记录里没有移动端定位签名，只有后台回写痕迹。",
          action: () => { addEvidence("E"); setFlag("foundShenbo"); }
        }
      };

      function showPlace(key) {
        const place = places[key];
        if (!place) return;
        place.action?.();
        document.querySelector("#mapResult").innerHTML = `
          <h2>${place.title}</h2>
          <p>${place.body}</p>
          ${key === "imp" ? `
            <section class="map-device-log">
              <span class="mono">source=Web Import · operator=shenbo_admin · batch=IMP-2202</span>
              <article>
                <strong>设备摘要</strong>
                <p>CAM 04 覆盖段与门禁队列同属北桥片区。B17 地下通道 17 号门在 00:17-00:22 进入维护窗口，门后检修道通向雨水泵站。</p>
              </article>
              <div class="map-log-actions">
                <a class="small-btn" href="phone-map.html?place=b17">B17 门禁</a>
                <a class="small-btn" href="phone-map.html?place=pump">泵站偏移</a>
              </div>
            </section>
          ` : ""}
        `;
      }

      document.querySelectorAll(".map-pin").forEach((pin) => {
        pin.addEventListener("click", () => {
          location.href = `phone-map.html?place=${encodeURIComponent(pin.dataset.place)}`;
        });
      });

      document.querySelector("#mapSearch").addEventListener("submit", (event) => {
        event.preventDefault();
        const q = normalize(new FormData(event.target).get("q"));
        if (q.includes("imp2202") || q.includes("imp-2202")) {
          if (hasFlag("foundImp2202") || hasEvidence("D")) location.href = "phone-map.html?place=imp";
          else toast("没有找到公开任务。先确认监控画面里的地图编号。");
        }
        else if (q.includes("s08") || q.includes("北桥体育馆")) location.href = "phone-map.html?place=s08";
        else if (q.includes("b17") || q.includes("17号门") || q.includes("地下")) location.href = "phone-map.html?place=b17";
        else if (q.includes("泵站") || q.includes("排水")) location.href = "phone-map.html?place=pump";
        else if (q.includes("s04") || q.includes("西桥")) location.href = "phone-map.html?place=s04";
        else toast("没有找到地点。");
      });

      const initialPlace = params.get("place");
      if (initialPlace && places[initialPlace]) showPlace(initialPlace);
    </script>
  </body>
</html>
