<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>相机 - 林舟的手机</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="chat-shell">
    <main class="phone-stage">
      <section class="mi-phone">
        <section class="mi-screen camera-app screen-enter">
          <div class="camera-topbar">
            <a class="mini-back" href="chat.html">‹</a>
            <button class="camera-broken-control" type="button">⚡</button>
            <button class="camera-broken-control" type="button">HDR</button>
            <button class="camera-broken-control" type="button">⚙</button>
          </div>

          <div class="camera-viewfinder">
            <div class="focus-box"></div>
          </div>

          <div class="camera-modebar">
            <span>夜景</span>
            <strong>拍照</strong>
            <span>录像</span>
          </div>

          <div class="camera-controls">
            <button class="camera-switch camera-broken-control" type="button">↻</button>
            <button class="camera-shutter camera-broken-control" type="button" aria-label="拍照"></button>
            <button class="camera-album" id="openAlbumLock" type="button" aria-label="打开相册">
              <span></span>
            </button>
          </div>

          <div class="phone-app-toast" id="cameraToast" hidden></div>
        </section>
      </section>
    </main>
    <script src="common.js?v=20260615-bgm-fix"></script>
    <script>
      initGameShell({ stage: 3, page: "phone-camera" });

      document.querySelector("#openAlbumLock").addEventListener("click", () => {
        location.href = "phone-gallery.html";
      });
      document.querySelectorAll(".camera-broken-control").forEach((button) => {
        button.addEventListener("click", () => {
          const box = document.querySelector("#cameraToast");
          box.textContent = "相机已损坏";
          box.hidden = false;
          box.classList.remove("show");
          void box.offsetWidth;
          box.classList.add("show");
          clearTimeout(window.cameraToastTimer);
          window.cameraToastTimer = setTimeout(() => { box.hidden = true; }, 1800);
        });
      });
    </script>
  </body>
</html>
