<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>音乐 - 林舟的手机</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="chat-shell">
    <main class="phone-stage">
      <section class="mi-phone">
        <div class="phone-island"><span></span><span></span><span></span></div>
        <section class="mi-screen app-screen screen-enter">
          <div class="app-head"><a class="mini-back" href="chat.html">‹</a><strong>音乐</strong></div>
          <div class="music-card">
            <h2 id="trackTitle">Gymnopédie No.1</h2>
            <p id="trackCredit">Erik Satie · CC0 / Wikimedia Commons</p>
            <audio id="musicAudio" controls loop></audio>
            <div class="music-controls">
              <button class="btn" id="prevTrack" type="button">上一首</button>
              <button class="btn primary" id="playTrack" type="button">播放/暂停</button>
              <button class="btn" id="nextTrack" type="button">下一首</button>
            </div>
            <div class="track-list" id="trackList"></div>
            <p class="muted">音乐页开着时可以后台播放；灵动岛会同步播放状态。跨标签自动续播受浏览器限制，需要用户手动点一次播放。</p>
          </div>
        </section>
      </section>
    </main>
    <script src="common.js"></script>
    <script>
      initGameShell({ stage: 5, page: "phone-music" });

      const tracks = [
        {
          title: "Gymnopédie No.1",
          credit: "Erik Satie · CC0 / Wikimedia Commons",
          src: "https://upload.wikimedia.org/wikipedia/commons/transcoded/b/b7/Gymnopedie_No._1..ogg/Gymnopedie_No._1..ogg.mp3",
          link: "https://commons.wikimedia.org/wiki/File:Gymnopedie_No._1..ogg"
        },
        {
          title: "Comfortable Mystery",
          credit: "Kevin MacLeod · Incompetech · CC BY",
          src: "https://incompetech.com/music/royalty-free/mp3-royaltyfree/Comfortable%20Mystery.mp3",
          link: "https://incompetech.com/"
        },
        {
          title: "Dark Walk",
          credit: "Kevin MacLeod · Incompetech · CC BY",
          src: "https://incompetech.com/music/royalty-free/mp3-royaltyfree/Dark%20Walk.mp3",
          link: "https://incompetech.com/"
        }
      ];

      const audio = document.querySelector("#musicAudio");
      const list = document.querySelector("#trackList");

      function clampTrack(index) {
        return ((Number(index) || 0) % tracks.length + tracks.length) % tracks.length;
      }

      function renderTrack(index = getMusicState().track || 0, autoplay = false) {
        const safeIndex = clampTrack(index);
        const track = tracks[safeIndex];
        document.querySelector("#trackTitle").textContent = track.title;
        document.querySelector("#trackCredit").textContent = track.credit;
        audio.src = track.src;
        list.innerHTML = tracks.map((item, itemIndex) => `<button class="${itemIndex === safeIndex ? "active" : ""}" data-track="${itemIndex}" type="button"><strong>${item.title}</strong><span>${item.credit}</span></button>`).join("");
        list.querySelectorAll("button").forEach((button) => button.addEventListener("click", () => {
          setMusicState({ track: Number(button.dataset.track), playing: true });
          renderTrack(Number(button.dataset.track), true);
        }));
        setMusicState({ track: safeIndex });
        if (autoplay || getMusicState().playing) {
          audio.play().then(() => setMusicState({ playing: true })).catch(() => setMusicState({ playing: false }));
        }
      }

      document.querySelector("#playTrack").addEventListener("click", () => {
        if (audio.paused) {
          audio.play().then(() => setMusicState({ playing: true })).catch(() => {});
        } else {
          audio.pause();
          setMusicState({ playing: false });
        }
      });

      document.querySelector("#prevTrack").addEventListener("click", () => {
        const next = clampTrack((getMusicState().track || 0) - 1);
        setMusicState({ track: next, playing: true });
        renderTrack(next, true);
      });

      document.querySelector("#nextTrack").addEventListener("click", () => {
        const next = clampTrack((getMusicState().track || 0) + 1);
        setMusicState({ track: next, playing: true });
        renderTrack(next, true);
      });

      audio.addEventListener("play", () => setMusicState({ playing: true }));
      audio.addEventListener("pause", () => setMusicState({ playing: false }));
      renderTrack();
    </script>
  </body>
</html>
