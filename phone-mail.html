<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>校园邮箱 - 林舟的手机</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="chat-shell">
    <main class="phone-stage">
      <section class="mi-phone">
        <section class="mi-screen app-screen screen-enter">
          <div class="app-head"><a class="mini-back" href="chat.html">‹</a><strong>校园邮箱</strong></div>

          <form class="phone-mail-login" id="mailLogin">
            <div class="mail-logo">NHU</div>
            <h2>南洄大学统一身份认证</h2>
            <p class="mail-login-hint">统一身份认证服务 · mail.nhu.edu.cn</p>
            <label>邮箱账号<input id="mailUser" autocomplete="username" placeholder="学号 / 邮箱"></label>
            <label>密码<input id="mailPass" type="password" autocomplete="current-password" placeholder="请输入密码"></label>
            <button class="btn primary" type="submit">登录校园邮箱</button>
            <p id="mailError" class="mail-error"></p>
          </form>

          <section class="mail-app" id="mailApp" hidden>
            <div class="mail-list" id="mailList"></div>
            <article class="mail-detail" id="mailDetail">
              <h2>收件箱</h2>
              <p>林舟只留下两封和夜行赛有关的系统邮件。</p>
            </article>
          </section>
        </section>
      </section>
    </main>
    <script src="common.js"></script>
    <script>
      initGameShell({ stage: 18, page: "phone-mail" });
      const params = new URLSearchParams(location.search);

      const mails = [
        {
          from: "夜行赛系统",
          title: "成绩同步异常提醒",
          time: "6 月 6 日 21:38",
          preview: "夜航03 的 S08 签到记录已被判定为超时无效，后续成绩同步存在异常。",
          body: `
            <p>林舟同学，你所在队伍“夜航03”的赛段复核结果已经由夜行赛系统自动生成。本邮件用于同步学生端可见结论，不作为最终申诉材料。按照 6 月 6 日晚间的路线规则，S08 北桥体育馆签到点应在 21:38 后进入超时无效打卡状态；系统在该时间之后收到的签到，不会继续计入有效完赛顺序。</p>
            <p>复核时发现，你的移动端在 S01 至 S04 的上传格式完整，包含设备号、电量回传、定位签名和前台停留时长。S08 则被系统标为“超时无效”。问题出现在两段记录之间：学生端成绩表里仍显示了 S05、S06、S07 三个后半程签到点，而且三条记录的来源字段均为 <strong>Web Import</strong>。这类字段通常来自后台批量补录，不会携带手机定位签名，也不会出现正常跑动产生的轨迹间隔。</p>
            <p>系统邮件按权限隐藏了导入人、后台账号和完整批次号，只保留导出时间。夜航03 的异常批次导出时间为 <strong>22:38</strong>，比 S08 判定超时晚一小时。若你本人没有提交申诉材料，请不要反复刷新成绩页，以免覆盖学生端缓存；如需复核原始批次，只能由校园安全中心调取保卫系统留存的导入任务镜像。</p>
            <p>请同时注意：本邮件只说明成绩同步层面的异常，不等同于确认队伍实际完赛。若队员失联，或路线外出现人员滞留、设备离线、门禁维护等情况，请以校安系统、现场监控和保卫中心值班记录为准。夜行赛系统不会主动判断人员安全，也不会替代报警流程。</p>
            <p>如果你要写申诉，请在备注里说明“后半程记录来源不是移动端自然上传”，并附上 S05-S07 的来源字段截图。学生端暂时不会显示导入人，只能看到导入方式、导出时间和成绩状态。请在 6 月 7 日 12:00 前完成反馈，逾期系统将按当前成绩归档。</p>
          `,
          action: () => { addEvidence("A"); setFlag("foundImportAnomaly"); }
        },
        {
          from: "校园安全中心",
          title: "校园安全管理账号到期提醒",
          time: "6 月 6 日 22:04",
          preview: "你申请的校园安全管理临时账号即将到期，请在有效期内完成课程复核。",
          body: `
            <p>林舟同学，你好。你在“城市夜行路线复核”课程实践中申请的校园安全管理临时账号，将于今日 23:59 到期。到期后，账号不再允许访问北桥片区的设备状态、低清回放索引、门禁摘要和维护工单概览。该权限只面向课程复核使用，请勿用于社团宣传、成绩争议截图传播或与本课程无关的资料调取。</p>
            <p>本次临时权限绑定的登录账号为 <strong>guest</strong>，当前密码为 <strong>cam042138</strong>。该账号仅允许查看归档通道，不具备删除、导出、覆盖、修改回放或调整摄像头参数的权限。若页面提示权限不足，请确认你是从校园保卫中心入口进入，而不是直接访问公开地址。</p>
            <p>北桥片区在 6 月 6 日晚间有多条维护记录：北桥体育馆外侧回放索引延迟，B17 地下通道门禁在夜间维护窗口内短暂离线，雨水泵站附近的设备摘要在 00:17 后出现人工备注。上述内容不一定与夜行赛有关，但如果你正在复核 S08 之后的路线，请把这些维护时间和地图编号一并核对。</p>
            <p>入口说明如下：新官网只保留统一通知，历史系统迁移说明仍在旧信息站的活动页面里。若需要进入保卫中心，请先从旧信息站找到“城市夜行 2023 路线复核”条目，再按页面中的保卫中心链接进入。保卫中心页面会把你转到 SECURICORP NVR 的校内镜像；直接打开 NVR 公开页时，CAM 04 的低清回放入口不会出现在列表中。</p>
            <p>如果你在回放画面里看到类似 IMP 开头的地图编号或导入任务编号，请先记下完整编号，再到地图应用查询对应位置。校园安全中心不会在邮件中列出具体编号，避免未授权人员根据邮件内容定位设备。若你本人未申请该权限，请立刻联系值班室注销账号。</p>
            <p>本邮件为系统自动发送。账号到期后不会再次提醒，旧入口也可能随迁移计划关闭。请在有效期内完成复核，并遵守课程数据使用约定。</p>
          `,
          action: () => setFlag("foundNvrLogin")
        }
      ];

      function openMailApp() {
        document.querySelector("#mailLogin").hidden = true;
        document.querySelector("#mailApp").hidden = false;
        document.querySelector("#mailApp").classList.remove("reading-mail");
        renderMailList();
      }

      function renderMailList() {
        document.querySelector("#mailList").innerHTML = mails.map((mail, index) => `
          <button class="mail-preview ${hasFlag(`readMail${index}`) ? "" : "unread-mail"}" data-index="${index}" type="button">
            <strong>${mail.from}</strong>
            <span>${mail.title}</span>
            <em>${mail.time}</em>
            <small>${mail.preview}</small>
          </button>
        `).join("");
        document.querySelectorAll("#mailList .mail-preview").forEach((button) => {
          button.addEventListener("click", () => {
            location.href = `phone-mail.html?mail=${button.dataset.index}`;
          });
        });
      }

      function openMail(index) {
        const mail = mails[index];
        setFlag(`readMail${index}`);
        document.querySelector("#mailApp").classList.add("reading-mail");
        document.querySelector("#mailDetail").innerHTML = `
          <button class="mail-detail-back" id="mailInboxBack" type="button">‹ 返回收件箱</button>
          <h2>${mail.title}</h2>
          <p class="mono">${mail.from} · ${mail.time}</p>
          <div class="mail-body">${mail.body}</div>
        `;
        mail.action();
        renderMailList();
        document.querySelector("#mailInboxBack").addEventListener("click", () => {
          location.href = "phone-mail.html?inbox=1";
        });
      }

      if (hasFlag("phoneMailLoggedIn")) {
        openMailApp();
        const mailIndex = params.get("mail");
        if (mailIndex !== null && mails[Number(mailIndex)]) openMail(Number(mailIndex));
      }

      document.querySelector("#mailLogin").addEventListener("submit", (event) => {
        event.preventDefault();
        const user = normalize(document.querySelector("#mailUser").value);
        const pass = normalize(document.querySelector("#mailPass").value);
        if ((user === "linzhou" || user === "linzhou@stu.nhu.edu.cn") && pass === "river17") {
          setFlag("phoneMailLoggedIn");
          location.href = "phone-mail.html?inbox=1";
        } else if ((user === "linzhou" || user === "linzhou@stu.nhu.edu.cn") && pass === "0606") {
          document.querySelector("#mailError").textContent = "认证失败：密码错误。";
        } else {
          document.querySelector("#mailError").textContent = "账号或密码错误。";
        }
      });
    </script>
  </body>
</html>
