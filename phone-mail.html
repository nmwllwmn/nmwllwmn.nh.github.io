<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>校园邮箱 - 林舟的手机</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="chat-shell">
    <main class="phone-stage">
      <section class="mi-phone">
        <section class="mi-screen app-screen screen-enter">
          <div class="app-head"><a class="mini-back" href="chat.html">‹</a><strong>校园邮箱</strong></div>

          <form class="phone-mail-login" id="mailLogin">
            <div class="mail-logo">NHU</div>
            <h2>南洄大学统一身份认证</h2>
            <p class="mail-login-hint">林舟自己的邮箱进不去。备忘录和微信里提到，真正留门的是江予白。</p>
            <label>邮箱账号<input id="mailUser" autocomplete="username" placeholder="学号 / 邮箱"></label>
            <label>密码<input id="mailPass" type="password" autocomplete="current-password" placeholder="请输入密码"></label>
            <button class="btn primary" type="submit">登录校园邮箱</button>
            <p id="mailError" class="mail-error"></p>
          </form>

          <section class="mail-app" id="mailApp" hidden>
            <div class="mail-list" id="mailList"></div>
            <article class="mail-detail" id="mailDetail">
              <h2>收件箱</h2>
              <p>几封系统邮件把官网导入、NVR 和 B17 串在了一起。</p>
            </article>
          </section>
        </section>
      </section>
    </main>
    <script src="common.js"></script>
    <script>
      initGameShell({ stage: 18, page: "phone-mail" });
      const params = new URLSearchParams(location.search);

      const mails = [
        {
          from: "夜行赛系统",
          title: "成绩同步异常提醒",
          time: "6 月 6 日 21:22",
          preview: "队伍 夜航03 的后半程记录存在导入异常。",
          body: "队伍 夜航03 的 S05-S07 签到记录来自 Web Import。导入人和批次号在系统邮件里被打码，只剩下导出时间 22:02。",
          action: () => { addEvidence("A"); setFlag("foundImportAnomaly"); }
        },
        {
          from: "校园安全中心",
          title: "北桥片区设备维护通知",
          time: "6 月 6 日 21:38",
          preview: "CAM 04 北桥北侧存在画面覆盖。",
          body: "CAM 04 北桥北侧 21:38-21:44 存在画面覆盖。临时查看账号 guest，密码 cam042138。请勿外传。",
          action: () => { addEvidence("D"); setFlag("foundNvrLogin"); }
        },
        {
          from: "信息化办公室",
          title: "旧站缓存清理失败",
          time: "6 月 5 日 09:16",
          preview: "citytrace/2023/cache 下仍存在旧路线索引。",
          body: "citytrace/2023/cache 下仍存在 route_20230606_old.pdf 索引。旧路线包含 S08 北桥体育馆，请城迹社自行确认是否继续清理。",
          action: () => addEvidence("B")
        },
        {
          from: "林舟",
          title: "草稿：如果我没回来",
          time: "未发送",
          preview: "别去主馆。排水声最大的地方才是入口。",
          body: "别去主馆。排水声最大的地方才是入口。B17 的门禁会在维护窗口短暂掉线，00:17 到 00:22。",
          action: () => { setFlag("foundPumpStation"); setFlag("foundRescueWindow"); }
        }
      ];

      function openMailApp() {
        document.querySelector("#mailLogin").hidden = true;
        document.querySelector("#mailApp").hidden = false;
        renderMailList();
      }

      function renderMailList() {
        document.querySelector("#mailList").innerHTML = mails.map((mail, index) => `
          <button class="mail-preview ${hasFlag(`readMail${index}`) ? "" : "unread-mail"}" data-index="${index}" type="button">
            <strong>${mail.from}</strong>
            <span>${mail.title}</span>
            <em>${mail.time}</em>
            <small>${mail.preview}</small>
          </button>
        `).join("");
        document.querySelectorAll("#mailList .mail-preview").forEach((button) => {
          button.addEventListener("click", () => {
            location.href = `phone-mail.html?mail=${button.dataset.index}`;
          });
        });
      }

      function openMail(index) {
        const mail = mails[index];
        setFlag(`readMail${index}`);
        document.querySelector("#mailDetail").innerHTML = `
          <h2>${mail.title}</h2>
          <p class="mono">${mail.from} · ${mail.time}</p>
          <p>${mail.body}</p>
          <button class="btn primary" id="recordMail" type="button">记录邮件线索</button>
        `;
        document.querySelector("#recordMail").addEventListener("click", () => {
          mail.action();
          toast("已记录邮件线索。");
          renderMailList();
        });
        renderMailList();
      }

      if (hasFlag("phoneMailLoggedIn")) {
        openMailApp();
        const mailIndex = params.get("mail");
        if (mailIndex !== null && mails[Number(mailIndex)]) openMail(Number(mailIndex));
      }

      document.querySelector("#mailLogin").addEventListener("submit", (event) => {
        event.preventDefault();
        const user = normalize(document.querySelector("#mailUser").value);
        const pass = normalize(document.querySelector("#mailPass").value);
        if ((user === "jiangyb" || user === "jiangyb@stu.nhu.edu.cn") && pass === "river17") {
          setFlag("phoneMailLoggedIn");
          location.href = "phone-mail.html?inbox=1";
        } else if ((user === "linzhou" || user === "linzhou@stu.nhu.edu.cn" || user === "20220606") && pass === "0606") {
          document.querySelector("#mailError").textContent = "林舟邮箱需要二次验证，当前设备无法登录。";
        } else {
          document.querySelector("#mailError").textContent = "账号或密码错误。";
        }
      });
    </script>
  </body>
</html>
