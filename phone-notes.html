<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>备忘录 - 林舟的手机</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="chat-shell">
    <main class="phone-stage">
      <section class="mi-phone">
        <section class="mi-screen app-screen screen-enter">
          <div class="app-head"><a class="mini-back" href="chat.html">‹</a><strong>备忘录</strong></div>
          <nav class="notes-tabs" aria-label="备忘录分类">
            <a href="phone-notes.html" id="notesAllTab">备忘录</a>
            <a href="phone-notes.html?box=trash" id="notesTrashTab">最近删除</a>
          </nav>
          <div class="notes-list">
            <article class="note-item notes-live">
              <time>6 月 6 日 16:10</time>
              <h2>雨停前</h2>
              <p>南洄的雨总是停得很突然。路面亮得像刚擦过，桥下却还是黑的。今晚只确认路线，不逞强。</p>
            </article>
            <article class="note-item notes-live">
              <time>6 月 6 日 18:04</time>
              <h2>同步</h2>
              <p>云端备份卡在 18:04。手机本地刚整理过一遍，等明早再核对。</p>
            </article>
            <article class="note-item important notes-trash">
              <time>6 月 6 日 17:58</time>
              <h2>收件箱</h2>
              <p>校园邮箱：linzhou@stu.nhu.edu.cn</p>
              <p>眠说别再把“河”写成拼音，她看着别扭。</p>
              <p>17 还是 17。别和 0606 混在一起。</p>
            </article>
            <article class="note-item notes-trash">
              <time>6 月 6 日 21:47</time>
              <h2>未命名</h2>
              <p>21:41 那条先别动。查不到归属地，内容也不像普通骚扰。</p>
            </article>
          </div>
        </section>
      </section>
    </main>
    <script src="common.js"></script>
    <script>
      initGameShell({ stage: 4, page: "phone-notes" });
      const box = new URLSearchParams(location.search).get("box") === "trash" ? "trash" : "all";
      document.body.dataset.notesBox = box;
      document.querySelector("#notesAllTab").classList.toggle("active", box === "all");
      document.querySelector("#notesTrashTab").classList.toggle("active", box === "trash");
    </script>
  </body>
</html>
