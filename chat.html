<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>林舟的手机</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="prefetch" href="phone-wechat.html">
    <link rel="prefetch" href="phone-wechat-contacts.html">
    <link rel="prefetch" href="phone-browser.html">
    <link rel="prefetch" href="phone-mail.html">
    <link rel="prefetch" href="phone-sms.html">
    <link rel="prefetch" href="phone-notes.html">
    <link rel="prefetch" href="phone-gallery.html">
    <link rel="prefetch" href="phone-camera.html">
    <link rel="prefetch" href="phone-map.html">
    <link rel="prefetch" href="phone-settings.html">
    <link rel="prefetch" href="phone-game.html">
    <link rel="prefetch" href="phone-call.html">
  </head>
  <body class="chat-shell">
    <main class="phone-stage">
      <section class="mi-phone" aria-label="林舟的手机">
        <div class="phone-island">
          <span></span><span></span><span></span>
        </div>

        <section class="mi-screen lock-screen" id="lockScreen">
          <div class="statusbar">
            <span>中国移动</span>
            <span>5G <i class="status-battery" data-phone-battery-bar></i><span data-phone-battery>100%</span></span>
          </div>
          <div class="lock-time">
            <div class="lock-clock" data-live-time>--:--</div>
            <div class="lock-date" data-live-date>--</div>
          </div>
          <div class="lock-hint">
            <div class="unlock-track" id="unlockTrack">
              <div class="swipe-cue" aria-hidden="true"><span></span><span></span><span></span></div>
              <button class="unlock-button" id="unlockBtn" type="button">上滑解锁</button>
            </div>
          </div>
        </section>

        <section class="mi-screen home-screen" id="homeScreen" hidden>
          <div class="shade-layer" id="shadeLayer" hidden>
            <section class="control-center" id="controlCenter">
              <div class="cc-head"><strong>控制中心</strong><span data-live-time>--:--</span></div>
              <div class="cc-grid">
                <button class="cc-tile on" type="button">Wi-Fi<br><span>NHU-Guest</span></button>
                <button class="cc-tile on" type="button">移动数据<br><span>5G</span></button>
                <button class="cc-tile" type="button">静音<br><span>关闭</span></button>
                <button class="cc-tile on" type="button">手电筒<br><span>可用</span></button>
              </div>
              <div class="slider-row"><span>亮度</span><input type="range" min="20" max="100" value="74"></div>
              <div class="slider-row"><span>音量</span><input type="range" min="0" max="100" value="28"></div>
            </section>
            <section class="notification-center" id="notificationCenter">
              <div class="cc-head"><strong>通知</strong><span>今天</span></div>
              <article class="notice-card"><strong>微信</strong><p>阿远发来 3 条未读消息。</p></article>
              <article class="notice-card"><strong>浏览器</strong><p>night.nhu.edu.cn 已在后台打开。</p></article>
              <article class="notice-card"><strong>系统服务</strong><p>低电量模式已关闭。</p></article>
            </section>
          </div>

          <div class="statusbar">
            <span data-live-time>--:--</span>
            <span>5G <i class="status-battery" data-phone-battery-bar></i><span data-phone-battery>100%</span></span>
          </div>
          <div class="home-date" data-live-full-date>--</div>
          <div class="pull-zone left" data-panel="notifications"></div>
          <div class="pull-zone right" data-panel="controls"></div>

          <div class="home-apps">
            <button class="app-icon wechat-icon" data-url="phone-wechat.html" data-badge="3" type="button"><span><i>☘</i></span><strong>微信</strong></button>
            <button class="app-icon contacts-icon" data-url="phone-wechat-contacts.html" type="button"><span><i>人</i></span><strong>通讯录</strong></button>
            <button class="app-icon browser-icon" data-url="phone-browser.html" type="button"><span><i>南</i></span><strong>浏览器</strong></button>
            <button class="app-icon mail-icon" data-url="phone-mail.html" data-badge="3" type="button"><span><i>✉</i></span><strong>邮件</strong></button>
            <button class="app-icon sms-icon" data-url="phone-sms.html" type="button"><span><i>✦</i></span><strong>短信</strong></button>
            <button class="app-icon notes-icon" data-url="phone-notes.html" type="button"><span><i>记</i></span><strong>备忘录</strong></button>
            <button class="app-icon gallery-icon" data-url="phone-gallery.html" data-badge="!" type="button"><span><i>▧</i></span><strong>相册</strong></button>
            <button class="app-icon camera-icon" data-url="phone-camera.html" type="button"><span><i>◉</i></span><strong>相机</strong></button>
            <button class="app-icon map-icon" data-url="phone-map.html" type="button"><span><i>⌖</i></span><strong>地图</strong></button>
            <button class="app-icon settings-icon" data-url="phone-settings.html" type="button"><span><i>⚙</i></span><strong>设置</strong></button>
            <button class="app-icon game-icon" data-url="phone-game.html" type="button"><span><i>9</i></span><strong>游戏</strong></button>
          </div>

          <div class="dock">
            <button class="dock-icon dock-phone" data-url="phone-call.html" type="button">☎</button>
            <button class="dock-icon dock-device" data-url="phone-browser.html" type="button">南</button>
          </div>
          <div class="gesture-bar"></div>
        </section>
      </section>
    </main>

    <script src="common.js"></script>
    <script>
      initGameShell({ stage: 2, page: "phone" });
      const smsIcon = document.querySelector(".sms-icon");
      const threatCount = getThreatMessages().length;
      if (threatCount > 0) smsIcon.dataset.badge = String(threatCount);
      else smsIcon.removeAttribute("data-badge");

      const screens = ["lockScreen", "homeScreen"];
      function showScreen(id) {
        screens.forEach((screen) => {
          const el = document.querySelector("#" + screen);
          el.hidden = screen !== id;
          if (screen === id) {
            el.classList.remove("screen-enter");
            void el.offsetWidth;
            el.classList.add("screen-enter");
          }
        });
      }

      function unlockPhone() {
        showScreen("homeScreen");
        setFlag("phoneUnlocked");
      }

      document.querySelector("#unlockBtn").addEventListener("click", unlockPhone);

      const unlockTrack = document.querySelector("#unlockTrack");
      const unlockBtn = document.querySelector("#unlockBtn");
      let unlockStart = null;
      let unlocked = false;
      unlockTrack.addEventListener("pointerdown", (event) => {
        unlocked = false;
        unlockStart = event.clientY;
        unlockBtn.style.transition = "none";
        unlockTrack.setPointerCapture(event.pointerId);
      });
      unlockTrack.addEventListener("pointermove", (event) => {
        if (unlockStart === null || unlocked) return;
        const dy = Math.min(0, event.clientY - unlockStart);
        const progress = Math.min(1, Math.abs(dy) / 92);
        unlockBtn.style.transform = `translateY(${-92 * progress}px) scale(${1 - progress * 0.08})`;
        unlockBtn.style.opacity = String(1 - progress * 0.55);
        if (progress >= 1) {
          unlocked = true;
          unlockPhone();
        }
      });
      unlockTrack.addEventListener("pointerup", () => {
        unlockStart = null;
        unlockBtn.style.transition = "transform 0.22s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.22s ease";
        unlockBtn.style.transform = "";
        unlockBtn.style.opacity = "";
      });

      function prefetchApp(url) {
        if (!url || document.querySelector(`link[data-app-prefetch="${url}"]`)) return;
        const link = document.createElement("link");
        link.rel = "prefetch";
        link.href = url;
        link.dataset.appPrefetch = url;
        document.head.appendChild(link);
      }

      function launchApp(button) {
        button.classList.add("opening");
        location.href = button.dataset.url;
      }

      document.querySelectorAll("[data-url]").forEach((button) => {
        prefetchApp(button.dataset.url);
      });

      document.querySelectorAll("[data-url]").forEach((button) => {
        button.addEventListener("click", () => {
          launchApp(button);
        });
      });

      const shade = document.querySelector("#shadeLayer");
      function openShade(type) {
        shade.hidden = false;
        document.querySelector("#controlCenter").hidden = type !== "controls";
        document.querySelector("#notificationCenter").hidden = type !== "notifications";
        shade.classList.remove("shade-open");
        void shade.offsetWidth;
        shade.classList.add("shade-open");
      }
      function closeShade() {
        shade.hidden = true;
        shade.classList.remove("shade-open");
      }
      document.querySelectorAll(".pull-zone").forEach((zone) => {
        let start = null;
        zone.addEventListener("pointerdown", (event) => {
          start = event.clientY;
          zone.setPointerCapture(event.pointerId);
        });
        zone.addEventListener("pointermove", (event) => {
          if (start !== null && event.clientY - start > 42) openShade(zone.dataset.panel);
        });
        zone.addEventListener("pointerup", () => { start = null; });
      });
      shade.addEventListener("click", (event) => {
        if (event.target === shade) closeShade();
      });

      function updateLiveClock() {
        const now = new Date();
        const time = now.toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit", hour12: false });
        const date = now.toLocaleDateString("zh-CN", { month: "long", day: "numeric", weekday: "short" });
        const fullDate = now.toLocaleDateString("zh-CN", { year: "numeric", month: "long", day: "numeric", weekday: "short" });
        document.querySelectorAll("[data-live-time]").forEach((el) => { el.textContent = time; });
        document.querySelectorAll("[data-live-date]").forEach((el) => { el.textContent = date; });
        document.querySelectorAll("[data-live-full-date]").forEach((el) => { el.textContent = fullDate; });
      }
      updateLiveClock();
      setInterval(updateLiveClock, 1000);
      if (hasFlag("phoneUnlocked")) showScreen("homeScreen");

    </script>
  </body>
</html>
