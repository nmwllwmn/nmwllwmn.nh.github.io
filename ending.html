<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>结局 - 最后一次签到</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="chat-shell">
    <main class="phone-stage">
      <section class="mi-phone">
        <section class="mi-screen app-screen ending-app screen-enter">
          <div class="app-head"><a class="mini-back" id="endingBack" href="archive.html?stay=1">‹</a><strong>结局</strong></div>
          <section class="emergency-ending" id="emergencyEnding"></section>
        </section>
      </section>
    </main>
    <script src="common.js"></script>
    <script>
      initGameShell({ stage: 40, page: "phone-ending" });

      const state = loadGame();
      const evidence = state.evidence || {};
      const flags = state.flags || {};
      const hasTruth = Boolean(evidence.A && evidence.B && evidence.C && evidence.D && evidence.E);
      const hasSudokuCache = Boolean(flags.sudokuSecretSolved);
      const hasRescueRoute = Boolean(flags.foundB17 && flags.foundPumpStation && flags.foundRescueWindow);
      const hasAlbumReport = Boolean(hasSudokuCache && (flags.albumPhotoReported || flags.reportedMysteryMan));
      const type = new URLSearchParams(location.search).get("type");
      const canShowEnding = {
        normal: hasTruth && !hasSudokuCache,
        truth: hasTruth && hasSudokuCache && !hasAlbumReport && !hasRescueRoute,
        rescue: hasTruth && hasSudokuCache && hasRescueRoute && !hasAlbumReport,
        "album-report": hasAlbumReport
      };
      const root = document.querySelector("#emergencyEnding");
      const back = document.querySelector("#endingBack");

      if (!type || !canShowEnding[type]) {
        location.replace("archive.html?stay=1");
      }

      function restartButton() {
        return `<button class="btn primary" id="endingRestart" type="button" hidden>重新开始游戏</button>`;
      }

      function bindRestart() {
        const button = document.querySelector("#endingRestart");
        if (!button) return;
        button.hidden = false;
        button.addEventListener("click", () => {
          restartExploration({ keepNotebook: true });
        });
      }

      function revealEndingLines(rootSelector, step = 3800) {
        const lines = Array.from(document.querySelectorAll(`${rootSelector} .ending-reveal`));
        lines.forEach((line, index) => {
          setTimeout(() => {
            line.style.setProperty("--delay", "0s");
            line.hidden = false;
          }, 700 + index * step);
        });
        return 700 + lines.length * step;
      }

      function showNormalEnding() {
        back.href = "chat.html";
        root.innerHTML = `
          <section class="normal-ending" id="normalEnding">
            <figure class="ending-photo-frame">
              <img src="assets/normal-ending-gym.png" alt="雨夜的北桥体育馆" loading="lazy" decoding="async">
              <figcaption>北桥体育馆外侧 / 去往雨水泵站的路</figcaption>
            </figure>
            <div class="normal-ending-feed" id="normalFeed"></div>
            <div class="black-ending normal-black" id="normalBlack" hidden>
              <h2>普通结局</h2>
              <p class="ending-reveal" hidden>你把最后一条消息发出去后，定位停在北桥体育馆外侧。</p>
              <p class="ending-reveal" hidden>通话没有接通，录音里只剩雨声、排水声和一段越来越近的杂音。</p>
              <p class="ending-reveal" hidden>你没有找到 B17，也没有找到 00:17 的入口。</p>
              <p class="ending-reveal" hidden>手机最后一次亮起时，屏幕上仍停着那张没有打开的地图。</p>
              <p class="ending-reveal" hidden>随后，信号消失。</p>
              <p class="ending-reveal news-line" hidden>直至今日，我市一所大学已经失踪两名学生不知去向。</p>
              ${restartButton()}
            </div>
          </section>
        `;

        const feed = document.querySelector("#normalFeed");
        const lines = [
          ["23:48", "我要去水泵站了。"],
          ["23:49", "如果定位还在北桥附近，就说明我猜对了。"],
          ["23:51", "手机信号开始断续。屏幕亮度自动降到最低。"]
        ];

        lines.forEach((line, index) => {
          setTimeout(() => {
            const item = document.createElement("article");
            item.className = "normal-ending-line";
            item.innerHTML = `<span>${line[0]}</span><p>${line[1]}</p>`;
            feed.appendChild(item);
            item.scrollIntoView({ block: "end" });
          }, 1400 + index * 4200);
        });

        setTimeout(() => {
          document.querySelector("#normalEnding").querySelectorAll(".ending-photo-frame, .normal-ending-feed").forEach((el) => {
            el.hidden = true;
          });
          document.querySelector("#normalBlack").hidden = false;
          setTimeout(bindRestart, revealEndingLines("#normalBlack", 3000) + 2200);
        }, 1400 + lines.length * 4200 + 3200);
      }

      function showTruthEnding() {
        back.href = "chat.html";
        root.innerHTML = `
          <section class="normal-ending" id="truthEnding">
            <figure class="ending-photo-frame">
              <img src="assets/normal-ending-nvr.png" alt="21:38 北桥监控画面" loading="lazy" decoding="async">
              <figcaption>NVR / CAM 04 / 21:38 / IMP-2202</figcaption>
            </figure>
            <div class="normal-ending-feed" id="truthFeed"></div>
            <div class="black-ending normal-black" id="truthBlack" hidden>
              <h2>真相结局：旧站未删除</h2>
              <p class="ending-reveal" hidden>你证明了林舟没有自然完赛，S05-S07 来自 Web Import。</p>
              <p class="ending-reveal" hidden>旧站的 S08、NVR 的 IMP-2202、地图里的 shenbo_admin 串成了一条人为修改链。</p>
              <p class="ending-reveal" hidden>可是你没有找到 B17、泵站和 00:17 的完整入口，也没有提交隐藏照片。</p>
              <p class="ending-reveal" hidden>真相已经浮出水面，林舟仍在信号之外。</p>
              ${restartButton()}
            </div>
          </section>
        `;

        const feed = document.querySelector("#truthFeed");
        const lines = [
          ["证据 A", "成绩后半段不是自然上传，而是 Web Import。"],
          ["证据 B", "旧站缓存保留了被新版官网删掉的 S08：北桥体育馆。"],
          ["证据 D", "NVR 21:38 的覆盖残留指向 IMP-2202。"],
          ["证据 E", "IMP-2202 的执行账号指向 shenbo_admin。"],
          ["缺口", "救援路线仍缺一环，报警只能证明篡改，无法立刻定位林舟。"]
        ];

        lines.forEach((line, index) => {
          setTimeout(() => {
            const item = document.createElement("article");
            item.className = "normal-ending-line";
            item.innerHTML = `<span>${line[0]}</span><p>${line[1]}</p>`;
            feed.appendChild(item);
            item.scrollIntoView({ block: "end" });
          }, 900 + index * 3200);
        });

        setTimeout(() => {
          document.querySelector("#truthEnding").querySelectorAll(".ending-photo-frame, .normal-ending-feed").forEach((el) => {
            el.hidden = true;
          });
          document.querySelector("#truthBlack").hidden = false;
          setTimeout(bindRestart, revealEndingLines("#truthBlack", 4000) + 1200);
        }, 900 + lines.length * 3200 + 2400);
      }

      function showRescueEnding() {
        back.href = "chat.html";
        setFlag("rescuedLinzhou");
        root.innerHTML = `
          <section class="normal-ending" id="rescueEnding">
            <figure class="ending-photo-frame">
              <img src="assets/normal-ending-gym.png" alt="雨夜的北桥体育馆" loading="lazy" decoding="async">
              <figcaption>北桥体育馆 / B17 / 00:17 维护窗口</figcaption>
            </figure>
            <div class="normal-ending-feed" id="rescueFeed"></div>
            <div class="black-ending normal-black" id="rescueBlack" hidden>
              <h2>隐藏结局：未完成的签到</h2>
              <p class="ending-reveal" hidden>你没有走向主馆，也没有把北桥当成终点。</p>
              <p class="ending-reveal" hidden>B17 是地下通道 17 号门，泵站侧门在 00:17 短暂解除门禁。</p>
              <p class="ending-reveal" hidden>你在手机剩余 2% 电量时找到了林舟。</p>
              <p class="ending-reveal" hidden>S08 从来不是完赛点，它是求救点。</p>
              ${restartButton()}
            </div>
          </section>
        `;

        const feed = document.querySelector("#rescueFeed");
        const lines = [
          ["00:12", "你避开主馆，从北桥体育馆外侧绕到雨水泵站。"],
          ["00:17", "B17 门禁进入维护窗口，地下通道 17 号门短暂打开。"],
          ["00:19", "手机录音里的排水声和现场泵站噪声重合。"],
          ["00:23", "林舟被困在检修通道内，意识模糊，但仍有呼吸。"],
          ["00:26", "校安和急救赶到。手机电量停在 2%。"]
        ];

        lines.forEach((line, index) => {
          setTimeout(() => {
            const item = document.createElement("article");
            item.className = "normal-ending-line";
            item.innerHTML = `<span>${line[0]}</span><p>${line[1]}</p>`;
            feed.appendChild(item);
            item.scrollIntoView({ block: "end" });
          }, 900 + index * 3200);
        });

        setTimeout(() => {
          document.querySelector("#rescueEnding").querySelectorAll(".ending-photo-frame, .normal-ending-feed").forEach((el) => {
            el.hidden = true;
          });
          document.querySelector("#rescueBlack").hidden = false;
          setTimeout(bindRestart, revealEndingLines("#rescueBlack", 4000) + 1200);
        }, 900 + lines.length * 3200 + 2400);
      }

      function showAlbumReportEnding() {
        back.href = "phone-gallery.html?view=photo";
        setFlag("reportedMysteryMan");
        setFlag("albumPhotoReported");
        root.innerHTML = `
          <div class="emergency-call" id="emergencyCall">
            <div class="emergency-number">110</div>
            <p id="callStatus">正在自动拨号...</p>
          </div>
          <div class="police-dialog" id="policeDialog" hidden></div>
          <div class="black-ending" id="blackEnding" hidden>
            <h2>彩蛋结局：雨夜来电</h2>
            <p class="ending-reveal" hidden>你从林舟的手机里找到了那张被隐藏的照片。</p>
            <p class="ending-reveal" hidden>照片里的人被警方带走了。</p>
            <p class="ending-reveal" hidden>但林舟仍然失踪。</p>
            ${restartButton()}
          </div>
        `;

        const dialog = document.querySelector("#policeDialog");
        const lines = [
          ["110 接警中心", "operator", "您好，110。请问您遇到了什么情况？"],
          ["你", "player", "我朋友林舟失踪了。我从他的手机相册里发现了一张隐藏照片。"],
          ["你", "player", "照片是在北桥雨水泵站附近拍的。画面里有一个黑衣人，他拿着手机站在入口旁边。"],
          ["你", "player", "这张照片被单独锁在应用锁后面，文件名和拍摄时间都像是林舟故意留下来的。"],
          ["110 接警中心", "operator", "请不要靠近现场。请保留这部手机和照片原件，我们会通知辖区警力前往核查。"],
          ["110 接警中心", "operator", "我们已经记录报警信息。请保持电话畅通，等待警方联系。"]
        ];

        function appendLine(line) {
          const item = document.createElement("article");
          item.className = `police-line ${line[1]}`;
          item.innerHTML = `<strong>${line[0]}</strong><p>${line[2]}</p>`;
          dialog.appendChild(item);
          item.scrollIntoView({ block: "end" });
        }

        setTimeout(() => {
          document.querySelector("#callStatus").textContent = "已接通";
          dialog.hidden = false;
        }, 1300);

        lines.forEach((line, index) => {
          setTimeout(() => appendLine(line), 2400 + index * 4300);
        });

        setTimeout(() => {
          document.querySelector("#emergencyCall").hidden = true;
          dialog.hidden = true;
          document.querySelector("#blackEnding").hidden = false;
          setTimeout(bindRestart, revealEndingLines("#blackEnding", 4000) + 1200);
        }, 2400 + lines.length * 4300 + 2800);
      }

      if (canShowEnding[type]) {
        if (type === "normal") showNormalEnding();
        else if (type === "truth") showTruthEnding();
        else if (type === "rescue") showRescueEnding();
        else if (type === "album-report") showAlbumReportEnding();
      }
    </script>
  </body>
</html>
