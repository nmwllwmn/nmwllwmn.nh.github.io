<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>浏览器 - 林舟的手机</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="chat-shell">
    <main class="phone-stage">
      <section class="mi-phone">
        <section class="mi-screen browser-screen screen-enter">
          <div class="wechat-head"><a class="mini-back" href="chat.html">‹</a><strong>浏览器</strong><span></span></div>
          <form class="browser-search" id="browserSearch">
            <input name="q" placeholder="搜索本机历史 / 输入关键词">
            <button type="submit">搜索</button>
          </form>
          <section class="browser-history" id="browserHistory">
            <h2>历史记录</h2>
            <button data-page="event" type="button"><strong>南洄城市夜行定向赛 · 成绩查询</strong><span>night.nhu.edu.cn/result?team=night-03</span></button>
            <button data-page="oldsite" type="button"><strong>城迹社旧站缓存</strong><span>www.nhu.edu.cn/club/citytrace/2023/cache</span></button>
            <button data-page="xutingyu" type="button"><strong>许听雨 北桥 2023</strong><span>search.local?q=许听雨+北桥</span></button>
            <button data-page="b17" type="button"><strong>B17 门禁掉线</strong><span>sec.nhu.local/logs/b17</span></button>
            <button data-page="archive" type="button"><strong>密页集本机备份</strong><span>myj.local/cache/0606</span></button>
          </section>
          <section class="browser-page" id="browserPage" hidden>
            <div class="browser-page-head"><button class="mini-back" id="browserBack" type="button">‹</button><strong id="browserTitle">网页</strong></div>
            <article id="browserContent"></article>
          </section>
        </section>
      </section>
    </main>
    <script src="common.js"></script>
    <script>
      initGameShell({ stage: 10, page: "phone-browser" });
      const pages = {
        event: {
          title: "夜行赛成绩查询",
          html: "<h2>夜航03</h2><p>林舟显示 23:17 已完赛，但 S05、S06、S07 的上传方式均为 Web Import。</p><p class='mono'>linzhou / 0606 / Web Import</p>",
          action: () => addEvidence("A")
        },
        oldsite: {
          title: "城迹社旧站缓存",
          html: "<h2>route_20230606_old.pdf</h2><p>旧站缓存仍保留 2023 试跑路线索引。S01-S07 之外还有 S08：北桥体育馆。</p><p>新版公告删除了 S08，也删除了 2023 试跑说明。</p>",
          action: () => addEvidence("B")
        },
        xutingyu: {
          title: "许听雨 北桥 2023",
          html: "<h2>搜索快照</h2><p>校内旧帖提到：许听雨曾参加 2023 年 6 月 6 日城迹社试跑，最后出现地点为北桥体育馆。</p><p>原帖已不可访问，缓存标题含 B17。</p>",
          action: () => addEvidence("C")
        },
        b17: {
          title: "B17 门禁掉线",
          html: "<h2>sec.nhu.local/logs/b17</h2><p>备份日志：B17 门禁每晚 00:17-00:22 进入维护窗口。NVR 同步延迟 300 秒。</p><p class='mono'>rescue window: 00:17</p>",
          action: () => setFlag("foundRescueWindow")
        },
        archive: {
          title: "密页集本机备份",
          html: "<h2>MYJ-0606-S08</h2><p>林舟把密页集入口留在浏览器历史里。它不会替你判断答案，只会把已经找到的碎片恢复出来。</p><p><a class='btn primary' href='archive.html'>打开密页集</a></p>",
          action: () => setStage(40)
        }
      };

      const history = document.querySelector("#browserHistory");
      const page = document.querySelector("#browserPage");

      function openPage(key) {
        const data = pages[key];
        document.querySelector("#browserTitle").textContent = data.title;
        document.querySelector("#browserContent").innerHTML = `${data.html}<button class="btn primary" id="recordBrowser" type="button">记录网页线索</button>`;
        document.querySelector("#recordBrowser").addEventListener("click", () => {
          data.action();
          toast("已记录浏览器线索。");
        });
        history.hidden = true;
        page.hidden = false;
      }

      document.querySelectorAll("[data-page]").forEach((button) => {
        button.addEventListener("click", () => openPage(button.dataset.page));
      });

      document.querySelector("#browserSearch").addEventListener("submit", (event) => {
        event.preventDefault();
        const q = normalize(new FormData(event.target).get("q"));
        if (q.includes("s08") || q.includes("旧站") || q.includes("2023")) openPage("oldsite");
        else if (q.includes("许听雨") || q.includes("xutingyu")) openPage("xutingyu");
        else if (q.includes("b17") || q.includes("0017")) openPage("b17");
        else if (q.includes("归档") || q.includes("myj") || q.includes("archive")) openPage("archive");
        else if (q.includes("林舟") || q.includes("完赛") || q.includes("webimport")) openPage("event");
        else toast("本机历史没有匹配记录。试试 S08、B17、许听雨。");
      });

      document.querySelector("#browserBack").addEventListener("click", () => {
        page.hidden = true;
        history.hidden = false;
      });
    </script>
  </body>
</html>
