<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>浏览器 - 林舟的手机</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="chat-shell">
    <main class="phone-stage">
      <section class="mi-phone">
        <section class="mi-screen browser-screen screen-enter">
          <div class="wechat-head"><a class="mini-back" href="chat.html">‹</a><strong>浏览器</strong><span></span></div>
          <form class="browser-search" id="browserSearch">
            <input name="q" placeholder="搜索本机历史 / 输入关键词">
            <button type="submit">搜索</button>
          </form>
          <section class="browser-history" id="browserHistory">
            <h2>历史记录</h2>
            <p class="browser-section-label">最近访问</p>
            <button data-page="university" type="button"><strong>南洄大学官网</strong><span>www.nhu.edu.cn/search</span></button>
            <button data-page="event" type="button"><strong>南洄城市夜行定向赛 · 成绩查询</strong><span>night.nhu.edu.cn/result?team=night-03</span></button>
            <button data-page="oldsite" type="button"><strong>城迹社旧站缓存</strong><span>www.nhu.edu.cn/club/citytrace/2023/cache</span></button>
            <p class="browser-section-label">林舟反复打开</p>
            <button data-page="wall" type="button"><strong>南洄校园墙</strong><span>wall.nhu.edu.cn/search?北桥</span></button>
            <button data-page="drive" type="button"><strong>B17 备份目录</strong><span>share.nhu-cloud.invalid/B17</span></button>
            <button data-page="nvr" type="button"><strong>SECURICORP NVR</strong><span>sec.nhu.local/nvr/cam04</span></button>
            <p class="browser-section-label">本机搜索快照</p>
            <button data-page="xutingyu" type="button"><strong>许听雨 北桥 2023</strong><span>search.local?q=许听雨+北桥</span></button>
            <button data-page="b17" type="button"><strong>B17 门禁掉线</strong><span>sec.nhu.local/logs/b17</span></button>
            <button data-page="archive" type="button"><strong>本机备份记录</strong><span>myj.local/cache/0606</span></button>
          </section>
          <section class="browser-page" id="browserPage" hidden>
            <div class="browser-page-head"><button class="mini-back" id="browserBack" type="button">‹</button><strong id="browserTitle">网页</strong></div>
            <article id="browserContent"></article>
          </section>
        </section>
      </section>
    </main>
    <script src="common.js"></script>
    <script>
      initGameShell({ stage: 10, page: "phone-browser" });
      const pages = {
        university: {
          title: "南洄大学官网",
          html: "<h2>站内搜索：北桥</h2><p>官网只保留新版夜行定向赛页面，路线从 S01 到 S07。北桥体育馆相关附件显示已迁移。</p><p class='mono'>archive_ref: citytrace/2023/cache</p>",
          action: () => setFlag("foundOldSiteHint")
        },
        event: {
          title: "夜行赛成绩查询",
          html: "<h2>夜航03</h2><p>林舟显示 23:17 已完赛，但 S05、S06、S07 的上传方式均为 Web Import。</p><p class='mono'>linzhou / 0606 / Web Import</p>",
          action: () => addEvidence("A")
        },
        oldsite: {
          title: "城迹社旧站缓存",
          html: "<h2>route_20230606_old.pdf</h2><p>2023 试跑路线索引残留：S01-S04 后出现 S08，标注为北桥体育馆。</p><p class='mono'>cache_status: unsynced / newer page removed attachment</p>",
          action: () => addEvidence("B")
        },
        wall: {
          title: "南洄校园墙",
          html: "<h2>别再问 B17 了</h2><p>匿名帖只剩缓存摘要：三年前有人在北桥留下过一句话。</p><p><strong>评论 17：</strong>B17 不是楼层。门响过一次，后来监控就黑了。</p>",
          action: () => setFlag("foundB17")
        },
        drive: {
          title: "B17 备份目录",
          html: "<h2>share.nhu-cloud.invalid / B17</h2><p>目录里有一张抖动照片和一段残缺录音。照片边缘能看到地下通道 17 号门，录音底噪里有连续排水声。</p><p class='mono'>audio_tag: pump_station / offset 00:17</p>",
          action: () => { setFlag("foundB17"); setFlag("foundPumpStation"); }
        },
        nvr: {
          title: "SECURICORP NVR",
          html: `
            <section class="phone-nvr" id="phoneNvr">
              <div class="nvr-login-panel" id="nvrLoginPanel">
                <h2>SECURICORP NVR</h2>
                <p>SEC_NORTH 临时回放权限。归档通道仅保留低清副本，部分通道存在帧覆盖。</p>
                <form class="nvr-login-form" id="browserNvrLogin">
                  <label>账号<input name="account" autocomplete="off" placeholder="user"></label>
                  <label>密码<input name="password" type="password" placeholder="password"></label>
                  <button class="btn primary" type="submit">连接回放系统</button>
                </form>
              </div>
              <div class="nvr-console" id="nvrConsole" hidden>
                <div class="nvr-cam-list" aria-label="监控通道">
                  <button type="button" data-cam="04" class="active">CAM 04<span>北桥北侧 / archive</span></button>
                  <button type="button" data-cam="02">CAM 02<span>回放丢失 / black</span></button>
                  <button type="button" data-cam="08">CAM 08<span>体育馆外侧 / archive</span></button>
                </div>
                <div class="nvr-controls">
                  <label>回放时间
                    <input id="nvrTime" type="time" value="21:12">
                  </label>
                  <label>画面比例
                    <select id="nvrScale">
                      <option value="1">100%</option>
                      <option value="1.35">135%</option>
                      <option value="1.7">170%</option>
                      <option value="2.1">210%</option>
                    </select>
                  </label>
                </div>
                <div class="nvr-pan-panel" aria-label="画面位置调整">
                  <button type="button" data-pan="up">上</button>
                  <button type="button" data-pan="left">左</button>
                  <button type="button" data-pan="center">居中</button>
                  <button type="button" data-pan="right">右</button>
                  <button type="button" data-pan="down">下</button>
                  <button type="button" id="nvrZoom">增强边缘</button>
                </div>
                <p class="nvr-status" id="nvrStatus">已连接 CAM 04。最近异常段：21:38-21:44。</p>
                <div class="nvr-monitor-grid">
                  <div class="nvr-monitor active" data-monitor="04">
                    <div class="nvr-viewer" data-adjustable="true">
                      <div class="nvr-osd">
                        <span>CAM 04 北桥北侧</span>
                        <span id="nvrOsdTime">2026-06-06 21:12:00</span>
                      </div>
                      <img class="nvr-feed" src="assets/normal-ending-nvr.png" alt="北桥监控回放画面">
                      <div class="nvr-static"></div>
                      <div class="nvr-clue" id="nvrClue" hidden>S08 / IMP-2202</div>
                    </div>
                  </div>
                  <div class="nvr-monitor black" data-monitor="02">
                    <div class="nvr-black-screen">
                      <span>CAM 02</span>
                      <strong>NO SIGNAL</strong>
                      <small>21:38:12 LOST</small>
                    </div>
                  </div>
                  <div class="nvr-monitor" data-monitor="08">
                    <div class="nvr-viewer">
                      <div class="nvr-osd">
                        <span>CAM 08 体育馆外侧</span>
                        <span>2026-06-06 21:38:00</span>
                      </div>
                      <img class="nvr-feed" src="assets/normal-ending-gym.png" alt="北桥体育馆夜景监控画面">
                      <div class="nvr-static"></div>
                    </div>
                  </div>
                </div>
                <form class="inline-unlock" id="browserNvrForm">
                  <input name="answer" placeholder="overlay id">
                  <button class="btn primary" type="submit">写入回放记录</button>
                </form>
              </div>
            </section>
          `,
          action: null
        },
        xutingyu: {
          title: "许听雨 北桥 2023",
          html: "<h2>搜索快照</h2><p>校内旧帖提到：许听雨曾参加 2023 年 6 月 6 日城迹社试跑，最后出现地点为北桥体育馆。</p><p>原帖已不可访问，缓存标题含 B17。</p>",
          action: () => addEvidence("C")
        },
        b17: {
          title: "B17 门禁掉线",
          html: "<h2>sec.nhu.local/logs/b17</h2><p>备份日志：B17 门禁每晚 00:17-00:22 进入维护窗口。NVR 同步延迟 300 秒。</p><p class='mono'>rescue window: 00:17</p>",
          action: () => setFlag("foundRescueWindow")
        },
        archive: {
          title: "本机备份记录",
          html: "<h2>MYJ-0606-S08</h2><p>本机缓存副本。已恢复条目会自动写入，未恢复部分保持灰色。</p><p><a class='btn primary' href='archive.html'>打开备份记录</a></p>",
          action: () => setStage(40)
        }
      };

      const history = document.querySelector("#browserHistory");
      const page = document.querySelector("#browserPage");

      function goPage(key) {
        location.href = `phone-browser.html?site=${encodeURIComponent(key)}`;
      }

      function openPage(key) {
        const data = pages[key];
        if (!data) return;
        document.querySelector("#browserTitle").textContent = data.title;
        const recordButton = data.action ? `<button class="btn primary" id="recordBrowser" type="button">保存本页记录</button>` : "";
        document.querySelector("#browserContent").innerHTML = `${data.html}${recordButton}`;
        if (data.action) {
          document.querySelector("#recordBrowser").addEventListener("click", () => {
            data.action();
            toast("本页记录已保存。");
          });
        }
        const nvrForm = document.querySelector("#browserNvrForm");
        const nvrLogin = document.querySelector("#browserNvrLogin");
        if (nvrLogin) {
          const panel = document.querySelector("#nvrLoginPanel");
          const consolePanel = document.querySelector("#nvrConsole");
          const timeInput = document.querySelector("#nvrTime");
          const scaleInput = document.querySelector("#nvrScale");
          const zoomButton = document.querySelector("#nvrZoom");
          const clue = document.querySelector("#nvrClue");
          const status = document.querySelector("#nvrStatus");
          const osdTime = document.querySelector("#nvrOsdTime");
          const adjustableViewer = document.querySelector(".nvr-viewer[data-adjustable='true']");
          let nvrScale = 1;
          let nvrPanX = 0;
          let nvrPanY = 0;
          let nvrTimeReady = false;
          let nvrZoomReady = false;

          function applyNvrView() {
            adjustableViewer?.style.setProperty("--nvr-scale", String(nvrScale));
            adjustableViewer?.style.setProperty("--nvr-x", `${nvrPanX}%`);
            adjustableViewer?.style.setProperty("--nvr-y", `${nvrPanY}%`);
            const activeCam = document.querySelector(".nvr-cam-list button.active")?.dataset.cam;
            const lookingAtClue = activeCam === "04" && nvrTimeReady && nvrScale >= 1.7 && nvrPanX <= -14 && nvrPanY <= -10;
            clue.hidden = !lookingAtClue;
            nvrZoomReady = lookingAtClue;
            if (lookingAtClue) {
              status.textContent = "画面右下角出现覆盖残留：S08 / IMP-2202。";
            }
          }

          nvrLogin.addEventListener("submit", (event) => {
            event.preventDefault();
            const data = new FormData(event.target);
            const account = normalize(data.get("account"));
            const password = normalize(data.get("password"));
            if (account === "guest" && password === "cam042138") {
              setFlag("foundNvrLogin");
              panel.hidden = true;
              consolePanel.hidden = false;
              toast("NVR 登录成功。");
            } else {
              toast("登录失败。");
            }
          });

          document.querySelectorAll(".nvr-cam-list button").forEach((button) => {
            button.addEventListener("click", () => {
              document.querySelectorAll(".nvr-cam-list button").forEach((item) => item.classList.remove("active"));
              document.querySelectorAll(".nvr-monitor").forEach((item) => item.classList.remove("active"));
              button.classList.add("active");
              document.querySelector(`.nvr-monitor[data-monitor="${button.dataset.cam}"]`)?.classList.add("active");
              if (button.dataset.cam === "04") {
                status.textContent = nvrTimeReady ? "CAM 04 的 21:38 画面有覆盖残留。" : "已连接 CAM 04。最近异常段：21:38-21:44。";
              } else {
                status.textContent = button.dataset.cam === "02" ? "CAM 02 在关键时间黑屏，没有可用画面。" : "CAM 08 能看到体育馆外侧，但残留编号不在这里。";
              }
              clue.hidden = true;
              nvrZoomReady = false;
              applyNvrView();
            });
          });

          timeInput.addEventListener("change", () => {
            osdTime.textContent = `2026-06-06 ${timeInput.value || "21:12"}:00`;
            nvrTimeReady = timeInput.value === "21:38";
            nvrZoomReady = false;
            clue.hidden = true;
            status.textContent = nvrTimeReady ? "21:38 回放段出现压缩残影。" : "这个时间点没有明显异常。";
            applyNvrView();
          });

          scaleInput.addEventListener("change", () => {
            nvrScale = Number(scaleInput.value);
            status.textContent = nvrTimeReady ? "回放比例已调整，画面边缘出现压缩残影。" : "回放比例已调整。";
            applyNvrView();
          });

          document.querySelectorAll(".nvr-pan-panel button[data-pan]").forEach((button) => {
            button.addEventListener("click", () => {
              const direction = button.dataset.pan;
              if (direction === "center") {
                nvrPanX = 0;
                nvrPanY = 0;
              }
              if (direction === "left") nvrPanX = Math.min(22, nvrPanX + 8);
              if (direction === "right") nvrPanX = Math.max(-22, nvrPanX - 8);
              if (direction === "up") nvrPanY = Math.min(18, nvrPanY + 8);
              if (direction === "down") nvrPanY = Math.max(-18, nvrPanY - 8);
              status.textContent = nvrTimeReady ? "画面位置已调整。边缘残留增强。" : "画面位置已调整。";
              applyNvrView();
            });
          });

          zoomButton.addEventListener("click", () => {
            const activeCam = document.querySelector(".nvr-cam-list button.active")?.dataset.cam;
            if (activeCam === "04" && nvrTimeReady) {
              nvrScale = 2.1;
              nvrPanX = -18;
              nvrPanY = -14;
              scaleInput.value = "2.1";
              applyNvrView();
            } else {
              toast("当前通道或时间无可用残影。");
            }
          });

          nvrForm.dataset.ready = "false";
          nvrForm.addEventListener("nvr-ready-check", () => {
            nvrForm.dataset.ready = nvrZoomReady ? "true" : "false";
          });
        }
        if (nvrForm) {
          nvrForm.addEventListener("submit", (event) => {
            event.preventDefault();
            event.target.dispatchEvent(new Event("nvr-ready-check"));
            if (event.target.dataset.ready !== "true") {
              toast("画面残留未达到可记录状态。");
              return;
            }
            if (normalize(new FormData(event.target).get("answer")) === "imp-2202") {
              addEvidence("D");
              setFlag("foundImp2202");
              toast("证据 D 已记录：21:38 北桥监控异常。");
            } else {
              toast("编号未匹配。");
            }
          });
        }
        history.hidden = true;
        page.hidden = false;
      }

      document.querySelectorAll("#browserHistory button[data-page]").forEach((button) => {
        button.addEventListener("click", () => goPage(button.dataset.page));
      });

      document.querySelector("#browserSearch").addEventListener("submit", (event) => {
        event.preventDefault();
        const q = normalize(new FormData(event.target).get("q"));
        if (q.includes("官网") || q.includes("南洄大学")) goPage("university");
        else if (q.includes("校园墙") || q.includes("wall")) goPage("wall");
        else if (q.includes("网盘") || q.includes("备份") || q.includes("drive")) goPage("drive");
        else if (q.includes("nvr") || q.includes("监控") || q.includes("cam04")) goPage("nvr");
        else if (q.includes("s08") || q.includes("旧站") || q.includes("2023")) goPage("oldsite");
        else if (q.includes("许听雨") || q.includes("xutingyu")) goPage("xutingyu");
        else if (q.includes("b17") || q.includes("0017")) goPage("b17");
        else if (q.includes("归档") || q.includes("myj") || q.includes("archive")) goPage("archive");
        else if (q.includes("林舟") || q.includes("完赛") || q.includes("webimport")) goPage("event");
        else toast("本机历史没有匹配记录。");
      });

      document.querySelector("#browserBack").addEventListener("click", () => {
        location.href = "phone-browser.html";
      });

      const site = new URLSearchParams(location.search).get("site");
      if (site && pages[site]) openPage(site);
    </script>
  </body>
</html>
