        history.hidden = true;

        const guardLogin = document.querySelector("#guardLogin");

          nvrReady = lookingAtClue;
          if (lookingAtClue) {
            status.textContent = "右下角残影可读：S08 / 地图编号 IMP-2202。";
            addEvidence("D");
            setFlag("foundImp2202");

            activeMonitor?.classList.add("active");

              image.src = image.dataset.src;
              image.removeAttribute("data-src");

            if (button.dataset.cam === "04") {
              status.textContent = nvrTimeReady ? "CAM 04 的 21:38 画面有覆盖残留。" : "CAM 04 异常段提示：21:38-21:44。";
            } else if (button.dataset.cam === "02") {
              status.textContent = "CAM 02 在关键时间黑屏，门禁队列里只剩 B17 标记。";
              setFlag("foundB17");
            } else {
              status.textContent = "CAM 08 能看到体育馆外侧，但地图编号不在这里。";
            }
            clue.hidden = true;
            nvrReady = false;
            applyNvrView();
          });
        });

        timeInput.addEventListener("change", () => {
          osdTime.textContent = `2026-06-06 ${timeInput.value || "21:12"}:00`;
          nvrTimeReady = timeInput.value === "21:38";
          clue.hidden = true;
          nvrReady = false;
          status.textContent = nvrTimeReady ? "21:38 回放段出现压缩残影，需要放大并移动画面。" : "这个时间点没有明显异常。";
          applyNvrView();
        });

        scaleInput.addEventListener("change", () => {
          nvrScale = Number(scaleInput.value);
          status.textContent = nvrTimeReady ? "比例已调整，边缘残影增强。" : "比例已调整。先回到异常时间。";
          applyNvrView();
        });

        document.querySelectorAll(".nvr-pan-panel button[data-pan]").forEach((button) => {
          button.addEventListener("click", () => {
            const direction = button.dataset.pan;
            if (direction === "center") {
              nvrPanX = 0;
              nvrPanY = 0;
            }
            if (direction === "left") nvrPanX = Math.min(22, nvrPanX + 8);
            if (direction === "right") nvrPanX = Math.max(-22, nvrPanX - 8);
            if (direction === "up") nvrPanY = Math.min(18, nvrPanY + 8);
            if (direction === "down") nvrPanY = Math.max(-18, nvrPanY - 8);
            status.textContent = nvrTimeReady ? "画面位置已调整，继续检查右下角。" : "画面位置已调整。";
            applyNvrView();
          });
        });

        zoomButton.addEventListener("click", () => {
          if (nvrTimeReady) {
            nvrScale = 2.1;
            nvrPanX = -18;
            nvrPanY = -14;
            scaleInput.value = "2.1";
            applyNvrView();
          } else {
            toast("先把回放时间调到异常段。");
          }
        });

        nvrForm.addEventListener("submit", (event) => {
          event.preventDefault();
          if (!nvrReady) {
            toast("先在 21:38 的 CAM 04 画面里看清地图编号。");
            return;
          }
          if (normalize(new FormData(event.target).get("answer")) === "imp-2202" || normalize(new FormData(event.target).get("answer")) === "imp2202") {
            addEvidence("D");
            setFlag("foundImp2202");
            toast("已确认地图编号 IMP-2202。");
          } else {
            toast("编号不匹配。画面残影里是 IMP-2202。");
          }
        });
      }

      document.querySelectorAll("#browserHistory button[data-page]").forEach((button) => {
        button.addEventListener("click", () => goPage(button.dataset.page));
      });

      document.querySelector("#browserSearch").addEventListener("submit", (event) => {
        event.preventDefault();
        const raw = String(new FormData(event.target).get("q") || "").trim();
        const q = normalize(raw);
        const match = aliases.find((item) => item.keys.some((key) => q.includes(normalize(key))));
        if (match) goPage(match.page);
        else toast("没有找到匹配页面。");
      });

      document.querySelector("#browserBack").addEventListener("click", () => {
        location.href = "phone-browser.html";
      });

      const site = new URLSearchParams(location.search).get("site");
      if (site && pages[site]) openPage(site);
    </script>
  </body>
</html>
