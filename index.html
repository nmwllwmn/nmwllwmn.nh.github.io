<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>最后一次签到</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="hero">
      <div class="hero-inner">
        <div class="hero-kicker">NANHUI NIGHT TRACE / 0606</div>
        <h1>最后一次签到</h1>
        <p class="hero-quote">他们说他完成了比赛。可他最后发来的消息只有一句：“北桥不是终点。”</p>
        <p class="muted" style="color:#e0cfaa">一款站群式网页解密游戏。请在不同网页、搜索框、账号和档案中记录碎片。</p>
      </div>
    </main>

    <section class="intro-band">
      <div class="layout">
        <div class="intro-grid">
          <article class="intro-card">
            <h2>探寻</h2>
            <p>打开活动官网、大学官网、旧站、校园墙和监控系统，从正常网页里找出不正常的地方。</p>
          </article>
          <article class="intro-card">
            <h2>搜索</h2>
            <p>不同网站的搜索结果不同。人名、日期、编号、地点都可能是下一扇门。</p>
          </article>
          <article class="intro-card">
            <h2>记录</h2>
            <p>右上角有调查笔记。记录 S 编号、时间、账号和密码，会比记在脑子里可靠。</p>
          </article>
        </div>
        <div class="enter-area">
          <figure class="qr-card">
            <div class="qr-frame">
              <img src="assets/qr/xiaohongshu.jpg" alt="小红书二维码" onerror="this.closest('.qr-frame').classList.add('missing')">
            </div>
            <figcaption>小红书</figcaption>
          </figure>
          <div class="enter-core">
            <a class="btn primary enter-main" href="chat.html">进入南洄</a>
            <p>建议先准备纸笔，或使用右上角调查笔记。</p>
          </div>
          <figure class="qr-card">
            <div class="qr-frame">
              <img src="assets/qr/wechat-official.jpg" alt="公众号二维码" onerror="this.closest('.qr-frame').classList.add('missing')">
            </div>
            <figcaption>公众号</figcaption>
          </figure>
        </div>
        <p class="author-credit">作者：你没完了</p>
      </div>
    </section>
  </body>
</html>
