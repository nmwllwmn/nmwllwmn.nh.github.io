<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>密页集 - 林舟的手机</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="chat-shell">
    <main class="phone-stage">
      <section class="mi-phone">
        <section class="mi-screen app-screen archive-app screen-enter">
          <div class="app-head"><a class="mini-back" href="phone-browser.html">‹</a><strong>密页集</strong></div>
          <section class="archive-phone-feed" id="archiveFeed"></section>
        </section>
      </section>
    </main>
    <script src="common.js"></script>
    <script>
      initGameShell({ stage: 40, page: "phone-archive" });

      const feed = document.querySelector("#archiveFeed");
      const state = loadGame();
      const evidence = state.evidence || {};
      const flags = state.flags || {};
      const hasTruth = Boolean(evidence.A && evidence.B && evidence.C && evidence.D && evidence.E);
      const hasSudokuCache = Boolean(flags.sudokuSecretSolved);
      const hasRescueRoute = Boolean(flags.foundB17 && flags.foundPumpStation && flags.foundRescueWindow);
      const hasHiddenEnding = Boolean(hasTruth && hasSudokuCache && hasRescueRoute);

      function item(title, body, locked = false) {
        return `<article class="archive-phone-card ${locked ? "locked" : ""}">
          <span>${locked ? "未恢复" : "已恢复"}</span>
          <h2>${title}</h2>
          <p>${body}</p>
        </article>`;
      }

      const cards = [
        item("0606 / 起点", "林舟把 0606 留在微信、备忘录和邮箱密码里。它不是答案，是进入旧路线的第一把钥匙。"),
        item("S08 / 北桥体育馆", evidence.B ? "旧站缓存和相册照片都证明 2023 试跑存在 S08。新版官网删除了它。" : "需要在浏览器旧站缓存或相册中恢复 S08。", !evidence.B),
        item("许听雨 / 2023", evidence.C ? "许听雨参加过 2023 年 6 月 6 日试跑，最后出现地点与 S08 重合。" : "还缺少许听雨与 S08 的关联。", !evidence.C),
        item("IMP-2202", evidence.A && evidence.E ? "林舟 S05-S07 的完赛记录来自 Web Import，执行账号指向 shenbo_admin。" : "还没有把 Web Import 和执行账号连起来。", !(evidence.A && evidence.E)),
        item("21:38 / NVR", evidence.D ? "北桥 CAM 04 在 21:38 后出现覆盖。画面角落残留 IMP-2202。" : "还没有查看关键时间的 NVR。", !evidence.D),
        item("数独缓存", hasSudokuCache ? "第三关完成后，隐藏相册索引已经恢复，可以继续核对 B17、泵站和 00:17。" : "还没有完成数独第三关，隐藏相册索引仍未恢复。", !hasSudokuCache),
        item("B17 / 救援路线", hasRescueRoute ? "B17 不是编号备注，是地下通道 17 号门。入口在北桥雨水泵站，维护窗口为 00:17-00:22。" : "还缺 B17、泵站入口或 00:17 维护窗口。", !hasRescueRoute)
      ];

      let ending = "";
      if (hasHiddenEnding) {
        setFlag("rescuedLinzhou");
        ending = `<article class="archive-phone-ending rescue">
          <h2>隐藏结局：未完成的签到</h2>
          <p>你没有去主馆。你把林舟手机里的旧站、相册 EXIF、B17 门禁和 NVR 时间拼在一起，绕开了 21:38 的假画面。</p>
          <p class="mono">00:17 B17 门禁进入维护窗口<br>00:19 录音和照片上传完成<br>00:24 校园安全中心接警记录被同步</p>
          <p>林舟被找到时，手机还剩 2% 电量。S08 仍显示：未完成。</p>
        </article>`;
      } else if (hasTruth && flags.sudokuSecretSolved) {
        setFlag("reportedMysteryMan");
        ending = `<article class="archive-phone-ending truth">
          <h2>真相结局：旧站未删除</h2>
          <p>数独缓存恢复出隐藏相册索引。你没有贸然去北桥，而是把旧站、NVR、导入任务和相册线索备份到了密页集。</p>
          <p class="mono">报警回执已生成。<br>林舟仍未归队。</p>
        </article>`;
      } else if (hasTruth) {
        ending = `<article class="archive-phone-ending danger">
          <h2>普通结局：最后一次签到</h2>
          <p>你已经知道林舟没有完赛，也知道是谁补写了后半程。但你还不知道真正入口在哪里。</p>
          <p>手机震动了一下。未知号码再次打来。</p>
        </article>`;
      } else {
        ending = `<article class="archive-phone-ending pending">
          <h2>密页集未完成</h2>
          <p>这里不会判断对错。它只把你已经找到的碎片放在一起。继续回到手机里的浏览器、相册、邮箱、地图和 NVR。</p>
        </article>`;
      }

      feed.innerHTML = cards.join("") + ending;
    </script>
  </body>
</html>
