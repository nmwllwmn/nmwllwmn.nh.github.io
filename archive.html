<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>结局 - 林舟的手机</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="chat-shell">
    <main class="phone-stage">
      <section class="mi-phone">
        <section class="mi-screen app-screen archive-app screen-enter">
          <div class="app-head"><a class="mini-back" href="phone-browser.html">‹</a><strong>结局</strong></div>
          <section class="archive-phone-feed" id="archiveFeed"></section>
        </section>
      </section>
    </main>
    <script src="common.js?v=20260614-25dd102"></script>
    <script>
      initGameShell({ stage: 40, page: "phone-archive" });

      const feed = document.querySelector("#archiveFeed");
      const state = loadGame();
      const evidence = state.evidence || {};
      const flags = state.flags || {};
      const hasTruth = Boolean(evidence.A && evidence.B && evidence.C && evidence.D && evidence.E);
      const hasSudokuCache = Boolean(flags.sudokuSecretSolved);
      const hasRescueRoute = Boolean(flags.foundB17 && flags.foundPumpStation && flags.foundRescueWindow);
      const hasAlbumReport = Boolean(hasSudokuCache && (flags.albumPhotoReported || flags.reportedMysteryMan));
      const hasHiddenEnding = Boolean(hasTruth && hasSudokuCache && hasRescueRoute);
      const hasAlbumEnding = Boolean(hasTruth && hasSudokuCache && hasAlbumReport);

      const shouldStay = new URLSearchParams(location.search).get("stay") === "1";
      let pendingEndingUrl = "";
      if (!shouldStay && hasHiddenEnding && !hasAlbumEnding) {
        pendingEndingUrl = "ending.html?type=rescue";
      } else if (!shouldStay && hasTruth && hasSudokuCache && !hasAlbumEnding && !hasRescueRoute) {
        pendingEndingUrl = "ending.html?type=truth";
      } else if (!shouldStay && hasTruth && !hasSudokuCache && !hasAlbumEnding && !hasHiddenEnding) {
        pendingEndingUrl = "ending.html?type=normal";
      }

      function item(title, body, locked = false) {
        return `<article class="archive-phone-card ${locked ? "locked" : ""}">
          <span>${locked ? "未恢复" : "已恢复"}</span>
          <h2>${title}</h2>
          <p>${body}</p>
        </article>`;
      }

      const cards = [
        item("0606 / 起点", "微信、活动登录和旧目录记录里反复出现同一组日期。邮箱认证没有接受它。"),
        item("S08 / 北桥体育馆", evidence.B ? "旧站缓存和相册照片都证明 2023 试跑存在 S08。新版官网删除了它。" : "2023 旧路线缺少一个未同步节点。", !evidence.B),
        item("许听雨 / 2023", evidence.C ? "许听雨参加过 2023 年 6 月 6 日试跑，最后出现地点与 S08 重合。" : "2023 试跑人员记录尚未闭合。", !evidence.C),
        item("IMP-2202", evidence.A && evidence.E ? "林舟 S05-S07 的完赛记录来自 Web Import，执行账号指向 shenbo_admin。" : "Web Import 批次缺少执行账号回执。", !(evidence.A && evidence.E)),
        item("21:38 / NVR", evidence.D ? "北桥 CAM 04 在 21:38 后出现覆盖。画面角落残留 IMP-2202。" : "北桥 CAM 04 回放残留未写入。", !evidence.D),
        item("数独缓存", hasSudokuCache ? "隐藏相册索引恢复，文件名 IMG_062141 可读取。" : "隐藏相册索引仍未恢复。", !hasSudokuCache),
        item("B17 / 救援路线", hasRescueRoute ? "B17 不是编号备注，是地下通道 17 号门。入口在北桥雨水泵站，维护窗口为 00:17-00:22。" : "B17、泵站入口、维护窗口尚未闭合。", !hasRescueRoute)
      ];

      let ending = "";
      if (hasHiddenEnding && !hasAlbumEnding) {
        setFlag("rescuedLinzhou");
        ending = `<article class="archive-phone-ending rescue">
          <h2>隐藏结局：未完成的签到</h2>
          <p>你没有去主馆，也没有把 21:38 的画面当成终点。旧站、NVR、B17 门禁和泵站入口指向同一条地下维护线。</p>
          <ol class="ending-timeline">
            <li><span>00:17</span>B17 门禁进入维护窗口，地下通道短暂开放。</li>
            <li><span>00:19</span>泵站侧门被确认，录音和照片同步上传。</li>
            <li><span>00:24</span>校园安全中心接警记录写入，北桥假画面失效。</li>
          </ol>
          <p>林舟被找到时，手机还剩 2% 电量。他没有完成比赛，S08 也从来不是终点。</p>
          <p class="ending-verdict">救援完成 / 林舟已找到</p>
        </article>`;
      } else if (hasAlbumEnding) {
        ending = `<article class="archive-phone-ending truth">
          <h2>彩蛋结局：抓住幕后黑手</h2>
          <p>你把隐藏照片、旧站缓存、NVR 覆盖记录和导入账号一起提交给警方。证据链足够完整，照片里的人被带走了。</p>
          <ol class="ending-timeline">
            <li><span>21:38</span>北桥 CAM 04 出现覆盖，画面残留 IMP-2202。</li>
            <li><span>21:41</span>未知号码要求删除照片，暴露相册线索。</li>
            <li><span>回执</span>警方接收隐藏照片和后台导入记录。</li>
          </ol>
          <p>三年前的旧路线和今年被补写的成绩终于连成证据链。但你没有拼出 B17、泵站和 00:17 的完整救援路线。</p>
          <p class="ending-verdict">嫌疑人已控制 / 林舟仍未找到</p>
        </article>`;
      } else if (hasTruth && flags.sudokuSecretSolved) {
        ending = `<article class="archive-phone-ending truth">
          <h2>真相结局：旧站未删除</h2>
          <p>数独缓存恢复出相册密码。你已经知道旧站、NVR 和导入任务之间存在人为串改，也知道林舟的完赛记录不是自然生成的。</p>
          <ol class="ending-timeline">
            <li><span>已确认</span>S05-S07 为 Web Import，执行账号指向沈泊。</li>
            <li><span>已确认</span>2023 旧路线存在 S08，许听雨与北桥有关。</li>
            <li><span>未完成</span>隐藏照片、B17、泵站和 00:17 尚未形成救援闭环。</li>
          </ol>
          <p>你可以报警，但这一次只能证明有人改过路线和成绩。林舟仍在手机信号之外。</p>
          <p class="ending-verdict">真相成立 / 救援路线不完整</p>
        </article>`;
      } else if (hasTruth) {
        ending = `<article class="archive-phone-ending danger">
          <h2>普通结局：最后一次签到</h2>
          <p>五条核心证据已经拼齐：林舟没有自然完赛，后半程被 Web Import 补写，IMP-2202 指向执行账号。</p>
          <ol class="ending-timeline">
            <li><span>缺口</span>数独缓存未恢复，相册密码仍没有被确认。</li>
            <li><span>缺口</span>B17、泵站入口和 00:17 维护窗口仍缺任一环。</li>
            <li><span>来电</span>未知号码再次打来，提醒你“北桥没有第八个点”。</li>
          </ol>
          <p>你知道林舟没有完成比赛，却还不知道真正入口在哪里。</p>
          <p class="ending-verdict">证据齐全 / 行动失败</p>
        </article>`;
      } else {
        ending = `<article class="archive-phone-ending pending">
          <h2>结局尚未形成</h2>
          <p>本机备份只显示已恢复条目，未恢复部分保持灰色。</p>
        </article>`;
      }

      feed.innerHTML = cards.join("") + ending;
      if (pendingEndingUrl) {
        setTimeout(() => {
          location.replace(pendingEndingUrl);
        }, 2200);
      }
    </script>
  </body>
</html>
