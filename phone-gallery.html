<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>相册 - 林舟的手机</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="chat-shell">
    <main class="phone-stage">
      <section class="mi-phone">
        <section class="mi-screen app-screen screen-enter">
          <div class="app-head"><a class="mini-back" href="chat.html">‹</a><strong>相册</strong></div>
          <section class="gallery-lock" id="galleryLock">
            <div class="app-lock-card">
              <strong>相册已锁定</strong>
              <p>请先通过相机右下角相册入口验证应用锁。</p>
              <a class="btn primary" href="phone-camera.html">打开相机</a>
            </div>
          </section>
          <section class="gallery-content" id="galleryContent" hidden>
            <div class="photo-grid">
              <button>S01<br>正门</button>
              <button>S02<br>邮筒</button>
              <button>S03<br>旧书摊</button>
              <button>S04<br>西桥</button>
              <button class="locked-photo">已隐藏</button>
              <button>截图<br>路线</button>
            </div>
            <p class="app-tip">有一张照片被系统标记为隐藏，缩略图信息被覆盖。</p>
          </section>
        </section>
      </section>
    </main>
    <script src="common.js"></script>
    <script>
      initGameShell({ stage: 3, page: "phone-gallery" });
      if (hasFlag("albumLockOpened")) {
        document.querySelector("#galleryLock").hidden = true;
        document.querySelector("#galleryContent").hidden = false;
      }
    </script>
  </body>
</html>
