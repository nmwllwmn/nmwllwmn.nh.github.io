<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>相册 - 林舟的手机</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="chat-shell">
    <main class="phone-stage">
      <section class="mi-phone">
        <section class="mi-screen app-screen gallery-app screen-enter">
          <div class="app-head"><a class="mini-back" href="chat.html">‹</a><strong>相册</strong></div>

          <section class="gallery-lock" id="galleryLock" hidden>
            <div class="app-lock-card">
              <strong>相册已锁定</strong>
              <p>请输入 6 位应用锁密码</p>
              <form class="inline-unlock" id="galleryPasswordForm">
                <input id="galleryPassword" inputmode="numeric" maxlength="6" autocomplete="off" placeholder="相册密码">
                <button class="btn primary" type="submit">解锁</button>
              </form>
              <em id="galleryPasswordError"></em>
            </div>
          </section>

          <section class="gallery-content" id="galleryGridView" hidden>
            <div class="gallery-count">隐藏相册 · 1 张照片</div>
            <div class="photo-grid single-photo-grid">
              <a class="photo-thumb evidence-photo-thumb" href="phone-gallery.html?view=photo" aria-label="打开隐藏照片">
                <img src="assets/hidden-photo-mastermind.png" alt="雨夜黑衣人在泵站入口附近回头">
                <span>IMG_062141</span>
                <em>2026-06-06 21:41</em>
              </a>
            </div>
          </section>

          <section class="gallery-content photo-view" id="galleryPhotoView" hidden>
            <figure class="evidence-photo-full">
              <img src="assets/hidden-photo-mastermind.png" alt="雨夜黑衣人在泵站入口附近回头">
            </figure>
            <article class="photo-detail">
              <h2>IMG_062141</h2>
              <p class="mono">2026-06-06 21:41 / 北桥雨水泵站 / B17 外侧</p>
              <p>照片里的人站在地下通道入口外，手里拿着手机。位置、时间和 NVR 覆盖窗口吻合。</p>
              <button class="btn primary" id="recordPhoto" type="button">记录这条线索</button>
            </article>
          </section>
        </section>
      </section>
    </main>
    <script src="common.js"></script>
    <script>
      initGameShell({ stage: 12, page: "phone-gallery" });

      const view = new URLSearchParams(location.search).get("view") || "lock";
      const lock = document.querySelector("#galleryLock");
      const grid = document.querySelector("#galleryGridView");
      const photo = document.querySelector("#galleryPhotoView");

      function showGalleryView(name) {
        lock.hidden = name !== "lock";
        grid.hidden = name !== "grid";
        photo.hidden = name !== "photo";
      }

      if (view === "grid" || view === "photo") {
        setFlag("albumLockOpened");
        showGalleryView(view);
      } else {
        showGalleryView("lock");
      }

      document.querySelector("#galleryPasswordForm").addEventListener("submit", (event) => {
        event.preventDefault();
        const password = normalize(document.querySelector("#galleryPassword").value);
        const error = document.querySelector("#galleryPasswordError");
        if (password === "062141") {
          setFlag("albumLockOpened");
          location.href = "phone-gallery.html?view=grid";
        } else {
          error.textContent = "密码错误。数独第三关缓存里有完整提示。";
        }
      });

      document.querySelector("#recordPhoto")?.addEventListener("click", () => {
        addEvidence("C");
        setFlag("foundB17");
        setFlag("foundPumpStation");
        setFlag("reportedMysteryMan");
        setFlag("albumPhotoReported");
        location.href = "archive.html?ending=album-report";
      });
    </script>
  </body>
</html>
