<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>微信聊天 - 林舟的手机</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="chat-shell">
    <main class="phone-stage">
      <section class="mi-phone">
        <section class="mi-screen wechat-screen chat-page screen-enter">
          <div class="wechat-head chat-head">
            <a class="mini-back" href="phone-wechat.html">‹</a>
            <strong id="chatTitle">微信</strong>
            <span></span>
          </div>
          <div class="wechat-detail" id="chatDetail"></div>
          <form class="wechat-composer">
            <button type="button" aria-label="语音">↕</button>
            <input type="text" placeholder="消息" aria-label="消息输入框">
            <button type="button" aria-label="更多">＋</button>
          </form>
        </section>
      </section>
    </main>
    <script src="common.js?v=20260615-map-bgm"></script>
    <script src="wechat-data.js"></script>
    <script>
      initGameShell({ stage: 5, page: "phone-wechat-chat" });

      const key = new URLSearchParams(location.search).get("chat") || "player";
      const chat = WECHAT_CHATS[key] || WECHAT_CHATS.player;

      document.querySelector("#chatTitle").textContent = chat.title;
      document.title = `${chat.title} - 微信`;

      function messageHtml([type, text]) {
        if (type === "time") return `<div class="chat-time">${text}</div>`;
        if (type === "system") return `<div class="system-msg">${text}</div>`;
        if (type.startsWith("call")) return `<div class="wechat-call ${type}">${text}</div>`;

        const isMe = type === "me";
        const avatar = isMe ? "舟" : (WECHAT_AVATAR_MAP[type] || chat.avatar || chat.title.slice(0, 1));
        const sender = chat.group && !isMe && WECHAT_NAME_MAP[type] ? `<b>${WECHAT_NAME_MAP[type]}</b>` : "";
        return `
          <div class="message-line ${isMe ? "me" : ""}">
            <span class="msg-avatar">${avatar}</span>
            <div class="bubble ${isMe ? "me" : ""}">${sender}${text.replace(/\n/g, "<br>")}</div>
          </div>
        `;
      }

      document.querySelector("#chatDetail").innerHTML = `
        <div class="wechat-messages">
          ${chat.messages.map(messageHtml).join("")}
        </div>
      `;

      if (chat.readFlag) setFlag(chat.readFlag);
      if (chat.action) chat.action();
    </script>
  </body>
</html>
