<!doctype html>
<html lang="zh-CN">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>南洄大学邮箱</title><link rel="stylesheet" href="styles.css"></head>
  <body>
    <header class="site-top"><div class="site-id"><span class="site-mark">@</span><div><h1>南洄大学统一邮箱</h1><p>mail.nhu.edu.cn</p></div></div><nav class="top-actions"><a class="plain-link" href="drive.html">B17 网盘</a><a class="plain-link" href="nvr.html">NVR</a></nav></header>
    <main class="layout stack">
      <section class="panel">
        <h2>邮箱登录</h2>
        <form id="mailLogin" class="login-form">
          <input name="account" placeholder="邮箱账号">
          <input name="password" type="password" placeholder="密码">
          <button class="btn primary" type="submit">登录</button>
        </form>
      </section>
      <section id="mailbox" class="grid" hidden></section>
    </main>
    <script src="common.js"></script>
    <script>
      initGameShell({ stage: 28, page: "mail" });
      const mailboxHtml = [
        "<article class='mail-item'><h2>夜行赛系统：成绩同步异常提醒</h2><p>队伍 夜航03 的 S05-S07 签到记录来自 Web Import。导出时间 22:02。</p></article>",
        "<article class='mail-item'><h2>周祁：NVR 临时访问</h2><p>仅限调试使用，勿外传。</p><p>入口：<a href='nvr.html'>nvr.html</a></p><p class='mono'>用户：guest<br>密码：cam042138</p></article>",
        "<article class='mail-item'><h2>信息化办公室：旧站缓存清理失败</h2><p>citytrace/2023/cache 下仍存在 route_20230606_old.pdf 索引。旧路线包含 S08 北桥体育馆。</p></article>"
      ].join("");

      function openMailbox() {
        document.querySelector("#mailbox").innerHTML = mailboxHtml;
        document.querySelector("#mailbox").hidden = false;
      }

      if (hasFlag("phoneMailLoggedIn")) openMailbox();
      document.querySelector("#mailLogin").addEventListener("submit", (e) => {
        e.preventDefault();
        const data = new FormData(e.target);
        const account = normalize(data.get("account"));
        const password = normalize(data.get("password"));
        if ((account === "linzhou" || account === "linzhou@stu.nhu.edu.cn") && password === "river17") {
          setFlag("phoneMailLoggedIn"); setStage(30);
          openMailbox();
          toast("林舟校园邮箱已打开。");
        } else if ((account === "linzhou" || account === "linzhou@stu.nhu.edu.cn") && password === "0606") {
          toast("认证失败：密码错误。");
        } else toast("邮箱账号或密码错误。");
      });
    </script>
  </body>
</html>
