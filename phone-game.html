<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>数独 - 林舟的手机</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="chat-shell">
    <main class="phone-stage">
      <section class="mi-phone">
        <div class="phone-island"><span></span><span></span><span></span></div>
        <section class="mi-screen app-screen screen-enter">
          <div class="app-head"><a class="mini-back" href="chat.html">‹</a><strong>数独</strong></div>
          <div class="sudoku-app">
            <div class="sudoku-tabs">
              <button class="active" data-level="1" type="button">第一关</button>
              <button data-level="2" type="button">第二关</button>
              <button data-level="3" type="button">第三关</button>
            </div>
            <div class="sudoku-meta" id="sudokuMeta"></div>
            <div class="sudoku-grid" id="sudokuGrid"></div>
            <div class="number-pad" id="numberPad"></div>
            <button class="btn primary" id="submitSudoku" type="button">提交</button>
            <div class="phone-app-toast" id="sudokuToast" hidden></div>
          </div>
        </section>
      </section>
      <aside class="phone-note">
        <h1>隐藏游戏</h1>
        <p>点格子，再从下方数字面板选择数字。前两关为 4x4，第三关为 8x8。</p>
      </aside>
    </main>
    <script src="common.js?v=20260615-bgm-fix"></script>
    <script>
      initGameShell({ stage: 5, page: "phone-game" });

      const sudokuLevels = {
        1: {
          title: "第一关 · 横竖 4x4",
          size: 4,
          boxCols: 2,
          boxRows: 2,
          mode: "rows-cols",
          givens: "1.344..2.1.334..",
        },
        2: {
          title: "第二关 · 横竖交叉 4x4",
          size: 4,
          boxCols: 2,
          boxRows: 2,
          mode: "rows-cols-boxes",
          givens: ".2..3..1..4..3..",
        },
        3: {
          title: "第三关 · 深水 8x8",
          size: 8,
          boxCols: 4,
          boxRows: 2,
          mode: "rows-cols-boxes",
          givens: "1...........1....3...........3....5...........5....7...........7",
        }
      };

      let currentSudokuLevel = 1;
      let selectedCell = null;

      function getUnlockedLevel() {
        return Number(loadGame().flags.sudokuUnlockedLevel || 1);
      }

      function setUnlockedLevel(level) {
        const state = loadGame();
        state.flags.sudokuUnlockedLevel = Math.max(getUnlockedLevel(), level);
        saveGame(state);
      }

      function renderSudoku(level) {
        const unlocked = getUnlockedLevel();
        level = Number(level);
        if (level > unlocked) {
          gameToast("先提交通过上一关。");
          return;
        }

        currentSudokuLevel = level;
        selectedCell = null;
        const data = sudokuLevels[currentSudokuLevel];
        const grid = document.querySelector("#sudokuGrid");
        const pad = document.querySelector("#numberPad");

        document.querySelectorAll(".sudoku-tabs button").forEach((btn) => {
          const btnLevel = Number(btn.dataset.level);
          btn.classList.toggle("active", btnLevel === currentSudokuLevel);
          btn.disabled = btnLevel > unlocked;
          btn.classList.toggle("locked", btnLevel > unlocked);
        });

        document.querySelector("#sudokuMeta").textContent = data.title;
        grid.className = `sudoku-grid size-${data.size}`;
        grid.style.setProperty("--sudoku-size", data.size);
        grid.style.setProperty("--box-cols", data.boxCols);
        grid.innerHTML = data.givens.split("").map((ch, index) => {
          const row = Math.floor(index / data.size);
          const col = index % data.size;
          const boxEdge = `${col % data.boxCols === data.boxCols - 1 ? " box-right" : ""}${row % data.boxRows === data.boxRows - 1 ? " box-bottom" : ""}`;
          if (ch === ".") {
            return `<button class="sudoku-cell editable${boxEdge}" data-index="${index}" type="button"></button>`;
          }
          return `<button class="sudoku-cell given${boxEdge}" data-index="${index}" type="button" disabled>${ch}</button>`;
        }).join("");

        pad.innerHTML = Array.from({ length: data.size }, (_, i) => `<button type="button" data-number="${i + 1}">${i + 1}</button>`).join("") + `<button type="button" data-number="">清除</button>`;

        document.querySelectorAll(".sudoku-cell.editable").forEach((cell) => {
          cell.addEventListener("click", () => {
            if (selectedCell) selectedCell.classList.remove("selected");
            selectedCell = cell;
            cell.classList.add("selected");
          });
        });

        document.querySelectorAll("#numberPad button").forEach((button) => {
          button.addEventListener("click", () => {
            if (!selectedCell) {
              gameToast("先点一个空格。");
              return;
            }
            selectedCell.textContent = button.dataset.number;
          });
        });
      }

      document.querySelectorAll(".sudoku-tabs button").forEach((btn) => {
        btn.addEventListener("click", () => renderSudoku(btn.dataset.level));
      });

      document.querySelector("#submitSudoku").addEventListener("click", () => {
        const result = validateSudoku();
        if (!result.ok) {
          gameToast(result.message);
          return;
        }

        if (currentSudokuLevel < 3) {
          setUnlockedLevel(currentSudokuLevel + 1);
          gameToast(`第 ${currentSudokuLevel} 关通过，下一关已解锁。`);
          renderSudoku(currentSudokuLevel + 1);
        } else {
          setFlag("sudokuSecretSolved");
          gameToast("彩蛋解锁：相册密码 062141。");
        }
      });

      function validateSudoku() {
        const data = sudokuLevels[currentSudokuLevel];
        const cells = Array.from(document.querySelectorAll("#sudokuGrid .sudoku-cell")).map((cell) => cell.textContent.trim());
        const allowed = new Set(Array.from({ length: data.size }, (_, i) => String(i + 1)));

        if (cells.some((value) => !allowed.has(value))) {
          return { ok: false, message: "提交失败，还有空格或无效数字。" };
        }

        const checkGroup = (values, label) => {
          const unique = new Set(values);
          if (unique.size !== data.size) return `${label} 有重复数字。`;
          for (const value of unique) {
            if (!allowed.has(value)) return `${label} 有无效数字。`;
          }
          return "";
        };

        for (let row = 0; row < data.size; row += 1) {
          const values = cells.slice(row * data.size, row * data.size + data.size);
          const error = checkGroup(values, `第 ${row + 1} 行`);
          if (error) return { ok: false, message: error };
        }

        for (let col = 0; col < data.size; col += 1) {
          const values = [];
          for (let row = 0; row < data.size; row += 1) {
            values.push(cells[row * data.size + col]);
          }
          const error = checkGroup(values, `第 ${col + 1} 列`);
          if (error) return { ok: false, message: error };
        }

        if (data.mode === "rows-cols-boxes") {
          for (let boxRow = 0; boxRow < data.size; boxRow += data.boxRows) {
            for (let boxCol = 0; boxCol < data.size; boxCol += data.boxCols) {
              const values = [];
              for (let row = boxRow; row < boxRow + data.boxRows; row += 1) {
                for (let col = boxCol; col < boxCol + data.boxCols; col += 1) {
                  values.push(cells[row * data.size + col]);
                }
              }
              const error = checkGroup(values, `第 ${Math.floor(boxRow / data.boxRows) + 1}-${Math.floor(boxCol / data.boxCols) + 1} 宫`);
              if (error) return { ok: false, message: error };
            }
          }
        }

        return { ok: true, message: "" };
      }

      function gameToast(message) {
        const box = document.querySelector("#sudokuToast");
        box.textContent = message;
        box.hidden = false;
        box.classList.remove("show");
        void box.offsetWidth;
        box.classList.add("show");
        clearTimeout(gameToast.timer);
        gameToast.timer = setTimeout(() => {
          box.hidden = true;
          box.classList.remove("show");
        }, 2600);
      }

      renderSudoku(getUnlockedLevel());
    </script>
  </body>
</html>
