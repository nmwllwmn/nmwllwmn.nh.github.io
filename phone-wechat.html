<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>微信 - 林舟的手机</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="chat-shell">
    <main class="phone-stage">
      <section class="mi-phone">
        <section class="mi-screen wechat-screen screen-enter">
          <div class="wechat-head">
            <a class="mini-back" href="chat.html">‹</a>
            <strong>微信</strong>
            <span></span>
          </div>

          <form id="wechatSearchForm">
            <input id="wechatSearch" class="wechat-search-input" autocomplete="off" placeholder="搜索">
          </form>

          <div class="wechat-list" id="wechatList"></div>

          <nav class="wechat-tabs">
            <a class="active" href="phone-wechat.html">消息</a>
            <a href="phone-wechat-contacts.html">通讯录</a>
            <a href="phone-moments.html">朋友圈</a>
          </nav>
        </section>
      </section>
    </main>
    <script src="common.js"></script>
    <script src="wechat-data.js"></script>
    <script>
      initGameShell({ stage: 4, page: "phone-wechat" });
      const searchKeyword = new URLSearchParams(location.search).get("q") || "";

      const chatRows = Object.entries(WECHAT_CHATS).map(([key, chat]) => ({
        key,
        name: chat.listTitle || chat.title,
        avatar: chat.avatar,
        tone: chat.tone,
        pinned: chat.pinned,
        preview: getWechatPreview(chat),
        time: chat.time,
        unreadFlag: chat.readFlag
      }));

      function renderRows(keyword = "") {
        const query = normalize(keyword);
        const rows = chatRows.filter((row) => normalize(row.name + row.preview).includes(query));
        document.querySelector("#wechatList").innerHTML = rows.map((row) => {
          const unread = !hasFlag(row.unreadFlag);
          return `
            <a class="chat-row ${row.pinned ? "pinned" : ""} ${unread ? "unread" : ""}" href="phone-wechat-chat.html?chat=${row.key}">
              <span class="avatar ${row.tone}">${row.avatar}</span>
              <span>
                <strong>${row.name}</strong>
                <em>${row.preview}</em>
              </span>
              <time>${row.time}</time>
            </a>
          `;
        }).join("") || `<p class="empty-state">没有找到聊天记录。</p>`;
      }

      document.querySelector("#wechatSearch").value = searchKeyword;
      document.querySelector("#wechatSearchForm").addEventListener("submit", (event) => {
        event.preventDefault();
        const keyword = document.querySelector("#wechatSearch").value.trim();
        location.href = keyword ? `phone-wechat.html?q=${encodeURIComponent(keyword)}` : "phone-wechat.html";
      });

      renderRows(searchKeyword);
    </script>
  </body>
</html>
