<!doctype html>
<html lang="zh-CN">
  <head>

    <title>微信 - 林舟的手机</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="chat-shell">
    <main class="phone-stage">
      <section class="mi-phone">
        <div class="phone-island"><span></span><span></span><span></span></div>
        <section class="mi-screen wechat-screen screen-enter">
          <div class="wechat-head">
            <a class="mini-back" href="chat.html">‹</a>
            <strong>微信</strong>
            <a class="mini-back" href="phone-moments.html">朋友圈</a>
          </div>
          <div class="wechat-search">搜索</div>
          <div class="wechat-list">
            <a class="chat-row pinned" href="phone-wechat-chat.html?chat=parents">
              <span class="avatar family">家</span>
              <span><strong>爸妈</strong><em>妈：明天中午回个电话，好吗？</em></span>
              <time>置顶</time>
            </a>
            <a class="chat-row pinned" href="phone-wechat-chat.html?chat=girlfriend">
              <span class="avatar love">沈</span>
              <span><strong>沈眠</strong><em>如果官网说我完赛了，别信。</em></span>
              <time>置顶</time>
            </a>
            <a class="chat-row unread" href="phone-wechat-chat.html?chat=player">
              <span class="avatar dark">远</span>
              <span><strong>阿远</strong><em>林舟：北桥不是终点。</em></span>
              <time>昨天</time>
            </a>
            <a class="chat-row" href="phone-wechat-chat.html?chat=jiang">
              <span class="avatar blue">江</span>
              <span><strong>江予白</strong><em>他说旧路线里少了一个点。</em></span>
              <time>周日</time>
            </a>
            <a class="chat-row" href="phone-wechat-chat.html?chat=chen">
              <span class="avatar orange">陈</span>
              <span><strong>陈檐</strong><em>你们有人联系上林舟吗？</em></span>
              <time>周六</time>
            </a>
          </div>
          <nav class="wechat-tabs">
            <a class="active" href="phone-wechat.html">微信</a>
            <a href="phone-contacts.html">通讯录</a>

    <script>
      initGameShell({ stage: 4, page: "phone-wechat" });
