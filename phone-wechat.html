<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>微信 - 林舟的手机</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="chat-shell">
    <main class="phone-stage">
      <section class="mi-phone">
        <section class="mi-screen wechat-screen screen-enter">
          <div class="wechat-head">
            <a class="mini-back" href="chat.html">‹</a>
            <strong>微信</strong>
            <a class="mini-back" href="phone-moments.html">朋友圈</a>
          </div>

          <input id="wechatSearch" class="wechat-search-input" autocomplete="off" placeholder="搜索">

          <div class="wechat-list" id="wechatList"></div>

          <nav class="wechat-tabs">
            <a class="active" href="phone-wechat.html">消息</a>
            <a href="phone-wechat-contacts.html">通讯录</a>
            <a href="phone-moments.html">朋友圈</a>
          </nav>
        </section>
      </section>
    </main>
    <script src="common.js"></script>
    <script>
      initGameShell({ stage: 4, page: "phone-wechat" });

      const chatRows = [
        {
          key: "mom",
          name: "妈妈",
          avatar: "妈",
          tone: "family",
          pinned: true,
          preview: "电话怎么一直打不通？",
          time: "置顶",
          unreadFlag: "readChatMom"
        },
        {
          key: "dad",
          name: "爸爸",
          avatar: "爸",
          tone: "family dad",
          pinned: true,
          preview: "别老拍那些没人的地方，注意安全。",
          time: "置顶",
          unreadFlag: "readChatDad"
        },
        {
          key: "girlfriend",
          name: "沈眠",
          avatar: "眠",
          tone: "love",
          pinned: true,
          preview: "如果官网说我完赛了，别信。",
          time: "置顶",
          unreadFlag: "readChatGirlfriend"
        },
        {
          key: "player",
          name: "阿远",
          avatar: "远",
          tone: "dark",
          preview: "林舟：北桥不是终点。",
          time: "昨天",
          unreadFlag: "readChatPlayer"
        },
        {
          key: "jiang",
          name: "江予白",
          avatar: "江",
          tone: "blue",
          preview: "我只拿到过导出的表。",
          time: "周日",
          unreadFlag: "readChatJiang"
        },
        {
          key: "team",
          name: "夜航03小队",
          avatar: "队",
          tone: "orange",
          preview: "阿远：我打了微信语音，没接。",
          time: "周六",
          unreadFlag: "readChatTeam"
        }
      ];

      function renderRows(keyword = "") {
        const query = normalize(keyword);
        const rows = chatRows.filter((row) => normalize(row.name + row.preview).includes(query));
        document.querySelector("#wechatList").innerHTML = rows.map((row) => {
          const unread = !hasFlag(row.unreadFlag);
          return `
            <a class="chat-row ${row.pinned ? "pinned" : ""} ${unread ? "unread" : ""}" href="phone-wechat-chat.html?chat=${row.key}">
              <span class="avatar ${row.tone}">${row.avatar}</span>
              <span>
                <strong>${row.name}</strong>
                <em>${row.preview}</em>
              </span>
              <time>${row.time}</time>
            </a>
          `;
        }).join("") || `<p class="empty-state">没有找到聊天记录。</p>`;
      }

      document.querySelector("#wechatSearch").addEventListener("input", (event) => {
        renderRows(event.target.value);
      });

      renderRows();
    </script>
  </body>
</html>
